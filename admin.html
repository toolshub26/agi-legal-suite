<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affidavit Generator Premium System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  text-align:center;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

input{
  width:90%;
  padding:10px;
  margin:10px;
}

button{
  padding:12px 20px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.login{background:#007bff;color:#fff}
.signup{background:#28a745;color:#fff}
.buy{background:#ff9800;color:#fff}
.logout{background:#e91e63;color:#fff}
</style>

</head>

<body>

<div class="container">

<h2>🚀 Affidavit Premium System</h2>

<!-- LOGIN -->
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<br>

<button class="signup" onclick="signup()">Signup</button>
<button class="login" onclick="login()">Login</button>
<button class="logout" onclick="logout()">Logout</button>

<hr>

<h3>💰 Buy Premium ₹99</h3>
<button class="buy" onclick="buyPremium()">Buy Now</button>

<h3 id="status">Checking...</h3>

</div>

<script>

// 🔥 FIREBASE CONFIG (CHANGE THIS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ================= SIGNUP =================
function signup(){
  auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    alert("Signup Success ✅");
  }).catch(err=>alert(err.message));
}

// ================= LOGIN =================
function login(){
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(()=>{
    alert("Login Success ✅");
    checkPremium();
  }).catch(err=>alert(err.message));
}

// ================= LOGOUT =================
function logout(){
  auth.signOut();
  alert("Logged out ❌");
}

// ================= CHECK USER =================
auth.onAuthStateChanged(user=>{
  if(user){
    checkPremium();
  } else {
    document.getElementById("status").innerText = "Not Logged In ❌";
  }
});

// ================= BUY PREMIUM =================
function buyPremium(){

  let user = auth.currentUser;

  if(!user){
    alert("Please login first ❗");
    return;
  }

  var options = {
    "key": "YOUR_RAZORPAY_KEY",
    "amount": 9900,
    "currency": "INR",
    "name": "Affidavit Tool",
    "description": "Premium Upgrade",
    "handler": function (response){

      let expiry = Date.now() + (30*24*60*60*1000);

      db.collection("users").doc(user.uid).set({
        premium:true,
        expiry: expiry
      });

      alert("Premium Activated 🚀");
      checkPremium();
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}

// ================= CHECK PREMIUM =================
function checkPremium(){

  let user = auth.currentUser;

  if(!user) return;

  db.collection("users").doc(user.uid).get()
  .then(doc=>{

    if(!doc.exists){
      document.getElementById("status").innerText = "Free User ❌";
      return;
    }

    let data = doc.data();

    if(data.premium && data.expiry > Date.now()){
      document.getElementById("status").innerText = "Premium Active 🚀";
    } else {
      document.getElementById("status").innerText = "Premium Expired ❌";
    }

  });

}

</script>

</body>
</html>
