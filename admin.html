<!-- =========================================
ADD FIREBASE LIVE USERS
========================================= -->

<script type="module">

import {
initializeApp
} from
"https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc
} from
"https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* =========================================
REALTIME USERS
========================================= */

onSnapshot(
collection(db,"users"),
(snapshot)=>{

document.getElementById(
"totalUsers"
).innerText =
snapshot.size;

});

/* =========================================
MAKE PREMIUM
========================================= */

window.makePremium =
async function(uid){

await updateDoc(
doc(db,"users",uid),
{
premium:true
}
);

alert(
"Premium Activated ✅"
);

};

/* =========================================
DELETE USER
========================================= */

window.deleteUser =
async function(uid){

if(
!confirm(
"Delete this user?"
)
)return;

await deleteDoc(
doc(db,"users",uid)
);

alert(
"User Deleted ❌"
);

};

</script>

<script>

/* =========================================
DOWNLOAD REPORT
========================================= */

function downloadReport(){

const data = `
AGI ADMIN REPORT

Total Users: ${
document.getElementById(
"totalUsers"
).innerText
}

Premium Users: ${
document.getElementById(
"premiumUsers"
).innerText
}

Revenue: ${
document.getElementById(
"totalRevenue"
).innerText
}
`;

const blob =
new Blob([data],{
type:"text/plain"
});

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"admin-report.txt";

a.click();

}

/* =========================================
SEND NOTIFICATION
========================================= */

function sendNotification(){

alert(
"Push Notification Sent 🔔"
);

const box =
document.getElementById(
"notificationBox"
);

box.innerHTML += `

<div class="activity-item">

New admin notification pushed

</div>

`;

}

/* =========================================
AUTO REFRESH
========================================= */

let autoRefresh = false;

function toggleAutoRefresh(){

autoRefresh = !autoRefresh;

if(autoRefresh){

alert(
"Auto Refresh Enabled ♻️"
);

setInterval(()=>{

location.reload();

},60000);

}else{

alert(
"Auto Refresh Disabled ❌"
);

}

}

/* =========================================
FRAUD DETECTION
========================================= */

function detectFraud(){

alert(
"Fraud Scan Completed 🚨"
);

document.getElementById(
"activityBox"
).innerHTML += `

<div class="activity-item">

🚨 Suspicious withdrawal detected

</div>

`;

}

/* =========================================
EXPORT CSV
========================================= */

function exportUsers(){

let csv =
"Email,Wallet,Status\n";

document.querySelectorAll(
"#usersTable tr"
).forEach(row=>{

let cols =
row.querySelectorAll("td");

if(cols.length){

csv +=
cols[0].innerText + "," +
cols[1].innerText + "," +
cols[2].innerText + "\n";

}

});

const blob =
new Blob([csv],{
type:"text/csv"
});

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"users.csv";

a.click();

alert(
"CSV Exported 📥"
);

}

/* =========================================
LIVE CLOCK
========================================= */

setInterval(()=>{

document.title =
"AGI ADMIN • " +
new Date()
.toLocaleTimeString();

},1000);

</script>
