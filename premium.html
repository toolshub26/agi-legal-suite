@media print{

left:0;
top:0;

<script>

let signaturePad;

window.onload = ()=>{

const canvas =
document.getElementById(
"signaturePad"
);

const ratio =
Math.max(
window.devicePixelRatio || 1,
1
);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
200 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

signaturePad =
new SignaturePad(canvas,{
backgroundColor:"white"
});

};

function clearSignature(){

signaturePad.clear();

}

function generateAffidavit(){

const name =
document.getElementById(
"name"
).value;

const father =
document.getElementById(
"father"
).value;

const age =
document.getElementById(
"age"
).value;

const address =
document.getElementById(
"address"
).value;

const details =
document.getElementById(
"details"
).value;

const purpose =
document.getElementById(
"purposeType"
).value;

if(!name || !father || !age){

alert("Fill required fields");

return;

}

const sign =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

const docID =
"PREM-AFF-" +
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

document.getElementById(
"previewArea"
).innerHTML = `

<div class="stamp">
₹100
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>
I, ${name}, S/o ${father}, aged about ${age} years, resident of ${address}, do hereby solemnly affirm and declare as under.
</p>

<p>
<b>Purpose:</b>
${purpose}
</p>

<p>
${details}
</p>

${
sign
?
`<img src="${sign}" style="height:90px;margin-top:20px;">`
:
""
}

<div id="qrCodeContainer"></div>

<p style="margin-top:20px;text-align:center;">
${docID}
</p>

</div>
`;

generateQRCode(docID);

}

function generateQRCode(id){

const qr =
document.getElementById(
"qrCodeContainer"
);

qr.innerHTML = "";

new QRCode(qr,{
text:id,
width:120,
height:120
});

}

function downloadPDF(){

html2pdf()
.set({
margin:5,
filename:"Premium-Affidavit.pdf",
jsPDF:{
unit:"mm",
format:"a4",
orientation:"portrait"
}
})
.from(
document.getElementById(
"previewArea"
)
)
.save();

}

function exportPNG(){

html2canvas(
document.getElementById(
"previewArea"
)
).then(canvas=>{

const a =
document.createElement("a");

a.download =
"premium-affidavit.png";

a.href =
canvas.toDataURL();

a.click();

});

}

function toggleTheme(){

document.body.classList.toggle(
"light-mode"
);

}
