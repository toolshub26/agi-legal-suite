.watermark{

transform:translate(-50%,-50%) rotate(-30deg);

font-weight:800;
color:rgba(0,0,0,.04);
pointer-events:none;
}

.stamp{
position:absolute;
top:25px;
right:25px;
width:100px;
height:100px;
border:3px solid #dc2626;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:800;

.signature-box{

.doc-footer{

}

#qrCodeContainer{

justify-content:center;
margin-top:30px;

/* LIGHT MODE */

.light-mode{

color:#111827;

.light-mode .sidebar,
.light-mode .card,

.light-mode .select,

/* PRINT */

visibility:hidden;
}

#previewArea,
#previewArea *{

#previewArea{

left:0;
top:0;
width:100%;
background:white;
}

.topbar,
.sidebar,
.analytics{
display:none !important;

}

/* MOBILE */

@media(max-width:768px){

width:100%;
}

.watermark{
font-size:55px;

padding:18px;
}

<script>

let signaturePad;
let totalDocs = 0;

window.onload = ()=>{

initializeSignaturePad();

};

function initializeSignaturePad(){

const canvas =
document.getElementById(
"signaturePad"
);

resizeCanvas();

signaturePad =
new SignaturePad(canvas,{
backgroundColor:"white",
penColor:"black"
});

window.addEventListener(
"resize",
resizeCanvas
);

}

function resizeCanvas(){

const canvas =
document.getElementById(
"signaturePad"
);

const ratio =
Math.max(
window.devicePixelRatio || 1,
1
);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
200 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

}

function clearSignature(){

signaturePad.clear();

}

function generateDocID(){

return "PREM-AFF-" +
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

function generateAffidavit(){

const lang =
document.getElementById("lang").value;

const country =
document.getElementById("country").value;

const name =
document.getElementById("name").value;

const father =
document.getElementById("father").value;

const age =
document.getElementById("age").value;

const address =
document.getElementById("address").value;

const details =
document.getElementById("details").value;

const purpose =
document.getElementById("purposeType").value;

if(!name || !father || !age){

alert("Fill required fields ❌");

return;

}

let affidavitText = "";

if(lang==="Urdu"){

affidavitText =
`میں ${name} ولد ${father} عمر ${age} سال حلفیہ بیان دیتا ہوں۔`;

}
else if(lang==="Hindi"){

affidavitText =
`मैं ${name}, पिता ${father}, उम्र ${age} वर्ष शपथपूर्वक घोषणा करता हूँ।`;

}
else if(lang==="Arabic"){

affidavitText =
`أنا ${name} ابن ${father} أقر بأن عمري ${age} سنة.`;

}
else{

affidavitText =
`I, ${name}, S/o ${father}, aged about ${age} years, do hereby solemnly affirm.`;

}

const signature =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

const docID =
generateDocID();

document.getElementById(
"previewArea"
).innerHTML = `

<div class="stamp">
₹100
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>${affidavitText}</p>

<p>
Country:
<b>${country}</b>
</p>

<p>
Purpose:
<b>${purpose}</b>
</p>

<p>
Address:
<b>${address}</b>
</p>

<p>
${details}
</p>

<div class="signature-box">

${
signature
?
`<img
src="${signature}"
style="
height:90px;
max-width:220px;
">`
:
""
}

</div>

<div id="qrCodeContainer"></div>

<div class="doc-footer">

${docID}

<br><br>

Powered by AGI ULTRA PREMIUM

</div>

</div>

`;

generateQRCode(docID);

totalDocs++;

document.getElementById(
"totalDocs"
).innerText =
totalDocs;

}

function generateQRCode(docID){

const qr =
document.getElementById(
"qrCodeContainer"
);

qr.innerHTML = "";

new QRCode(qr,{
text:
location.origin +
"/verify.html?id=" +
docID,
width:140,
height:140
});

}

function downloadPDF(){

html2pdf()
.set({
margin:5,
filename:"Premium-Affidavit.pdf",
image:{
type:"jpeg",
quality:1
},
html2canvas:{
scale:2
},
jsPDF:{
unit:"mm",
format:"a4"
}
})
.from(
document.getElementById(
"previewArea"
)
)
.save();

}

function exportPNG(){

html2canvas(
document.getElementById(
"previewArea"
)
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"premium-affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

function shareWhatsApp(){

const text =
document.getElementById(
"previewArea"
).innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

function toggleTheme(){

document.body.classList.toggle(
"light-mode"
);

}

function logoutUser(){

localStorage.removeItem(
"user"
);

alert(
"Logged Out 🚪"
);

location.href =
"login.html";

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./sw.js"
);

}

</script>
