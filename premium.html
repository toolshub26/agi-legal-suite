<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#0a192f">
  <title>AGI ULTRA PRO v18 – Premium Affidavit System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.2s ease, color 0.2s, border-color 0.2s;
      transform: translateZ(0);
      will-change: transform;
    }
    :root {
      --bg-body: #0a192f;
      --card-bg: rgba(255,255,255,0.08);
      --glass: rgba(15,25,45,0.85);
      --gold: #d4af37;
      --text-primary: #eef2ff;
      --text-secondary: #b9c7d9;
      --border: rgba(212,175,55,0.4);
      --input-bg: #1e2a3e;
      --error-border: #e74c3c;
      --toast-bg: #2c3e50;
    }
    body.light {
      --bg-body: #f4f7fc;
      --card-bg: rgba(0,0,0,0.02);
      --glass: #ffffff;
      --text-primary: #0a2540;
      --text-secondary: #2c3e50;
      --border: #d4af37;
      --input-bg: #ffffff;
      --toast-bg: #eef2ff;
    }
    body {
      background: var(--bg-body);
      font-family: 'Segoe UI', system-ui, 'Times New Roman', serif;
      color: var(--text-primary);
      margin: 0;
      padding: 0;
    }
    /* Topbar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(12px);
      background: var(--glass);
      border-bottom: 1px solid var(--gold);
      padding: 0.8rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .logo-area {
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--gold), #ffdd88);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .premium-btn {
      background: linear-gradient(145deg, #b8860b, #d4af37);
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: bold;
      color: #0a192f;
      cursor: pointer;
      transition: 0.2s;
    }
    .glass-btn {
      background: rgba(255,255,240,0.1);
      backdrop-filter: blur(4px);
      border: 1px solid var(--gold);
      padding: 8px 16px;
      border-radius: 40px;
      color: var(--text-primary);
      cursor: pointer;
      transition: 0.2s;
    }
    .glass-btn:hover, .premium-btn:hover {
      transform: scale(0.97);
      opacity: 0.9;
    }
    .cards-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding: 1.5rem 2rem;
      justify-content: center;
    }
    .analytics-card {
      background: var(--glass);
      border-radius: 28px;
      padding: 1.2rem 2rem;
      text-align: center;
      border: 1px solid var(--gold);
      backdrop-filter: blur(8px);
    }
    .analytics-card h3 {
      font-size: 2rem;
      color: var(--gold);
    }
    .main-dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
    }
    @media (max-width: 850px) {
      .main-dashboard { grid-template-columns: 1fr; }
      .topbar { padding: 0.8rem 1rem; }
    }
    .form-panel, .preview-panel {
      background: var(--glass);
      border-radius: 32px;
      padding: 1.8rem;
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
    }
    .field {
      margin-bottom: 1.2rem;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 0.95rem;
    }
    input.error, select.error, textarea.error {
      border-color: var(--error-border);
      box-shadow: 0 0 0 1px var(--error-border);
    }
    .purpose-search {
      margin-bottom: 8px;
    }
    .purpose-scroll {
      max-height: 200px;
      overflow-y: auto;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.5rem;
    }
    .signature-area {
      margin: 1rem 0;
      border: 1px dashed var(--gold);
      border-radius: 20px;
      background: var(--input-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
    }
    canvas.signature-canvas {
      border: 1px solid var(--gold);
      border-radius: 12px;
      background: white;
      width: 100%;
      height: 150px;
      touch-action: none;
    }
    .affidavit-paper {
      background: white;
      color: black;
      font-family: 'Times New Roman', Times, serif;
      padding: 2rem;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 28px black;
      margin-bottom: 20px;
      line-height: 1.5;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .affidavit-paper[dir="rtl"] {
      font-family: 'Noto Sans Arabic', 'Noto Nastaliq Urdu', Tahoma, serif;
      text-align: right;
    }
    .affidavit-paper[dir="rtl"] .signature-grid {
      direction: rtl;
    }
    .watermark-text {
      position: absolute;
      bottom: 30px;
      right: 20px;
      font-size: 55px;
      opacity: 0.08;
      font-weight: bold;
      pointer-events: none;
      transform: rotate(-15deg);
      white-space: nowrap;
    }
    .stamp {
      position: absolute;
      bottom: 80px;
      right: 40px;
      border: 3px double;
      padding: 8px 12px;
      font-weight: bold;
      transform: rotate(-12deg);
      background: rgba(255,240,240,0.7);
      pointer-events: none;
    }
    .stamp.red { border-color: #b22222; color: #b22222; }
    .stamp.blue { border-color: #1e3a8a; color: #1e3a8a; }
    .stamp.gold { border-color: #d4af37; color: #b8860b; }
    .qr-container {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }
    .footer-note {
      font-size: 0.7rem;
      text-align: center;
      border-top: 1px solid #ccc;
      margin-top: 20px;
      padding-top: 8px;
    }
    .signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 20px 0;
    }
    .signature-col {
      text-align: center;
    }
    .signature-line {
      border-top: 2px solid black;
      margin-bottom: 8px;
    }
    .history-list {
      margin-top: 1rem;
      max-height: 150px;
      overflow-y: auto;
      font-size: 0.8rem;
      background: var(--input-bg);
      border-radius: 16px;
      padding: 8px;
    }
    .history-item {
      cursor: pointer;
      padding: 6px;
      border-bottom: 1px solid var(--border);
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--toast-bg);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 40px;
      border-left: 4px solid var(--gold);
      z-index: 3000;
      animation: slideIn 0.3s ease;
      pointer-events: none;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .offline-banner {
      background: #e67e22;
      color: white;
      text-align: center;
      padding: 6px;
      display: none;
    }
    .settings-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
      align-items: center;
    }
    .sticky-gen {
      position: sticky;
      bottom: 10px;
      z-index: 500;
      display: none;
    }
    @media (max-width: 850px) {
      .sticky-gen {
        display: block;
        margin-top: 10px;
      }
    }
    @media print {
      .form-panel, .topbar, .cards-row, .btn-group, .signature-area, .history-list, .offline-banner, .sticky-gen, .settings-bar {
        display: none !important;
      }
      .preview-panel {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        margin: 0;
        padding: 0;
        background: white;
      }
      .affidavit-paper {
        box-shadow: none;
        margin: 0;
        padding: 0.5rem;
        font-size: 11pt;
      }
      @page {
        size: A4;
        margin: 10mm;
      }
    }
    button:active { transform: scale(0.98); }
  </style>
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body class="dark">
<div id="offlineBanner" class="offline-banner">⚠️ You are offline – exports limited</div>
<div class="topbar">
  <div class="logo-area">⚖️ AGI ULTRA PRO v18 (PREMIUM)</div>
  <div class="btn-group">
    <button id="freeVersionBtn" class="glass-btn">📄 Free Version</button>
    <button id="premiumVersionBtn" class="premium-btn">👑 PREMIUM</button>
    <button id="pdfExportBtn" class="glass-btn">📑 PDF</button>
    <button id="pngExportBtn" class="glass-btn">🖼️ PNG</button>
    <button id="copyTextBtn" class="glass-btn">📋 Copy</button>
    <button id="themeToggleBtn" class="glass-btn">🌓 Theme</button>
    <button id="printNowBtn" class="glass-btn">🖨️ Print</button>
    <button id="logoutBtn" class="glass-btn">🚪 Logout</button>
  </div>
</div>
<div class="cards-row">
  <div class="analytics-card"><h3 id="totalDocsCount">0</h3><p>Total Docs</p></div>
  <div class="analytics-card"><h3 id="totalExportsCount">0</h3><p>Exports</p></div>
  <div class="analytics-card"><h3 id="topPurpose">-</h3><p>Top Purpose</p></div>
</div>
<div class="main-dashboard">
  <div class="form-panel">
    <h2>📝 Affidavit Details <span id="saveBadge" style="display:none; font-size:0.7rem; background:var(--gold); padding:2px 8px; border-radius:20px;">Saved</span></h2>
    <div class="field"><label>Full Name *</label><input type="text" id="fullName" value="Abdul Rahman Khan"></div>
    <div class="field"><label>Father's Name *</label><input type="text" id="fatherName" value="Mohammed Salim"></div>
    <div class="field"><label>Address *</label><input type="text" id="address" value="House 42, Street 8, Dubai, UAE"></div>
    <div class="field"><label>Country</label><select id="countrySelect"><option>India</option><option>UAE</option><option>USA</option><option>UK</option><option>Canada</option></select></div>
    <div class="field"><label>Language (instantly changes)</label><select id="langSelect"><option value="en">English</option><option value="ur">Urdu</option><option value="hi">Hindi</option><option value="ar">Arabic (RTL)</option></select></div>
    <div class="field"><label>📌 Purpose (filter)</label><input type="text" id="purposeSearch" placeholder="Search 100+ purposes..."></div>
    <div class="purpose-scroll"><select id="purposeDropdown" size="8"></select></div>
    <div class="field"><label>Sworn Statement</label><textarea id="swornStatement" rows="2">I hereby declare that the facts mentioned are true and accurate.</textarea></div>
    <div class="settings-bar">
      <select id="templateSelect"><option value="standard">Standard</option><option value="court">Court Format</option><option value="modern">Modern Legal</option><option value="compact">Compact</option></select>
      <select id="sealColorSelect"><option value="red">Red Seal</option><option value="blue">Blue Seal</option><option value="gold">Gold Seal</option></select>
      <select id="qualitySelect"><option value="standard">Export: Standard</option><option value="high">High</option><option value="ultra">Ultra</option></select>
      <label><input type="checkbox" id="watermarkToggle" checked> Watermark</label>
      <label><input type="checkbox" id="aiEnhanceToggle"> AI Enhance</label>
    </div>
    <div class="signature-area">
      <label>✍️ Electronic Signature</label>
      <canvas id="signatureCanvas" width="500" height="150" style="width:100%; height:150px; background:#fff;"></canvas>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <button id="clearSignatureBtn" class="glass-btn">Clear</button>
        <button id="saveSignatureBtn" class="premium-btn">Save</button>
      </div>
    </div>
    <button id="generateAffidavitBtn" class="premium-btn" style="width:100%; padding:14px;">✨ GENERATE NEW ID</button>
    <div class="history-list"><strong>📜 History (last 10)</strong><div id="historyContainer"></div></div>
    <div class="sticky-gen"><button id="mobileGenerateBtn" class="premium-btn" style="width:100%;">✨ Generate</button></div>
  </div>
  <div class="preview-panel">
    <div id="affidavitContainer" class="affidavit-paper">
      <div id="watermarkElem" class="watermark-text">PREMIUM LEGAL</div>
      <div id="stampElem" class="stamp red">📜 NOTARY SEAL</div>
      <div id="dynamicAffidavitContent"></div>
      <div id="qrArea" class="qr-container"></div>
      <div class="footer-note" id="docFooter">Document ID: AGI-XXXX</div>
    </div>
  </div>
</div>
<script>
  (function(){
    // ======================== ALL 100+ PURPOSES ========================
    const allPurposes = [
      "Name Change","Marriage","Income Proof","Passport Verification","Court Submission","Property Transfer",
      "Bank Loan","Education Loan","Visa Application","Aadhaar Correction","GST Registration","Police Verification",
      "Trademark Filing","Copyright Claim","Research Ethics","Startup Funding","Business Agreement","NGO Registration",
      "University Degree","Employment Contract","Residential Proof","Affidavit of Heirship","Lost Document",
      "Affidavit of Support","Guardianship","Medical Consent","Name Correction","Date of Birth Affidavit",
      "Single Status","Divorce Decree","No Objection Certificate","Affidavit of Residence","Business License",
      "Tax Residency","Vehicle Ownership","Insurance Claim","Intellectual Property","Export License","Customs Declaration",
      "Legal Heir","Succession Certificate","Indemnity Bond","Will Registration","Partnership Deed","Merger Filing",
      "Non-Criminal Record","Police Clearance","Character Certificate","Student Visa","Work Permit","Family Visa",
      "Sponsorship Affidavit","Real Estate Transfer","Mortgage Affidavit","Rental Agreement","Tenancy Dispute",
      "Labor Dispute","Arbitration","Mediation","Contract Review","Trademark Opposition","Patent Filing",
      "Utility Model","Industrial Design","Geographical Indication","Startup India","MSME Registration","IEC Code",
      "GST Cancellation","Income Tax Appeal","Customs Appeal","Bank Guarantee","Affidavit of Truth","Witness Statement",
      "Police Complaint","FIR Affidavit","Bail Affidavit","Anticipatory Bail","Interim Relief","Probate",
      "Letters of Administration","Legal Notice","Cease and Desist","Tender Document","Government Tender",
      "RTI Affidavit","Election Affidavit","NOC from Landlord","Construction Permit","Environmental Clearance",
      "Factory License","Trade License","FSSAI License","Drug License","Medical Practice","Nursing Registration",
      "Engineering Council","Architect Certification"
    ];
    for(let i=0;i<30;i++) allPurposes.push(`Legal Purpose ${i+100}`);

    // ======================== UI MESSAGES (multilingual) ========================
    const translations = {
      en: { title:"AFFIDAVIT", notary:"BEFORE THE NOTARY PUBLIC", intro:"I, {name}, son/daughter of {father}, resident of {address}, do hereby solemnly affirm:", c1:"1. That the deponent is competent to swear this affidavit.", c2:"2. Purpose of affidavit: {purpose}.", c3:"3. Sworn statement: {statement}.", c4:"4. I declare under penalty of perjury that above is true.", verified:"Verified under law of {country}.", place:"Place: ___________", date:"Date: {date}", leftSig:"Signature of Deponent", rightSig:"Signature & Seal of Notary", footer:"Document ID: " },
      ur: { title:"حلف نامہ", notary:"عدالتی حلف نامہ", intro:"میں {name} ولد {father} ساکن {address} حلفیہ بیان دیتا ہوں:", c1:"1۔ حلف نامہ دینے والا قانونی اہل ہے۔", c2:"2۔ مقصد: {purpose}", c3:"3۔ حلفیہ بیان: {statement}", c4:"4۔ بیان درست ہے۔", verified:"قانون {country} کے تحت توثیق شدہ", place:"مقام: ___________", date:"تاریخ: {date}", leftSig:"حلف نامہ دہندہ کے دستخط", rightSig:"نوٹری عوامی دستخط و مہر", footer:"دستاویز نمبر: " },
      hi: { title:"शपथ पत्र", notary:"नोटरी पब्लिक के समक्ष", intro:"मैं {name}, पुत्र/पुत्री {father}, निवासी {address}, सत्यनिष्ठा से शपथ लेता/लेती हूँ:", c1:"1. शपथकर्ता साक्ष्य देने योग्य है।", c2:"2. प्रयोजन: {purpose}", c3:"3. शपथ वक्तव्य: {statement}", c4:"4. सभी तथ्य सही हैं।", verified:"{country} के अधिनियम के अधीन सत्यापित", place:"स्थान: ___________", date:"तिथि: {date}", leftSig:"शपथकर्ता के हस्ताक्षर", rightSig:"नोटरी के हस्ताक्षर एवं मुहर", footer:"दस्तावेज़ आईडी: " },
      ar: { title:"إفادة خطية", notary:"أمام كاتب العدل", intro:"أنا {name} ابن {father} المقيم في {address} أشهد بأن:", c1:"١. المقر قانوني ومختص.", c2:"٢. الغرض: {purpose}.", c3:"٣. البيان: {statement}.", c4:"٤. كل ما ورد صحيح.", verified:"موثق بموجب قانون {country}.", place:"المكان: ___________", date:"التاريخ: {date}", leftSig:"توقيع المقر", rightSig:"توقيع وختم كاتب العدل", footer:"معرف المستند: " }
    };
    function getLang() { return document.getElementById('langSelect').value; }
    function showToast(msg, isError=false) {
      const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg; if(isError) toast.style.borderLeftColor = '#e74c3c';
      document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500);
    }
    function sanitize(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }

    // ======================== POPULATE PURPOSE DROPDOWN (ALL) ========================
    function populatePurposes(filter='') {
      const select = document.getElementById('purposeDropdown');
      const current = select.value;
      select.innerHTML = '';
      const filtered = allPurposes.filter(p => p.toLowerCase().includes(filter.toLowerCase()));
      filtered.forEach(p => { const opt = document.createElement('option'); opt.value = p; opt.textContent = p; select.appendChild(opt); });
      if(filtered.includes(current)) select.value = current;
      else if(filtered.length) select.value = filtered[0];
    }
    document.getElementById('purposeSearch').addEventListener('input', e => populatePurposes(e.target.value));
    document.getElementById('langSelect').addEventListener('change', () => { populatePurposes(document.getElementById('purposeSearch').value); renderAffidavit(); });

    // ======================== SIGNATURE PAD ========================
    const canvas = document.getElementById('signatureCanvas');
    let signaturePad = null, sigBackup = null, currentSignatureDataURL = "";
    function initSignaturePad() {
      const rect = canvas.getBoundingClientRect();
      const ratio = Math.max(2, window.devicePixelRatio || 1);
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      if(signaturePad) { signaturePad.clear(); if(sigBackup) signaturePad.fromData(sigBackup); }
      else signaturePad = new SignaturePad(canvas, { minDistance: 1, dotSize: 1.5, throttle: 16 });
    }
    function backupSignature() { if(signaturePad && !signaturePad.isEmpty()) { sigBackup = signaturePad.toData(); currentSignatureDataURL = signaturePad.toDataURL(); } else { sigBackup = null; currentSignatureDataURL = ""; } }
    window.addEventListener('resize', () => { backupSignature(); initSignaturePad(); renderAffidavit(); });
    initSignaturePad();
    document.getElementById('clearSignatureBtn').onclick = () => { signaturePad.clear(); sigBackup = null; currentSignatureDataURL = ""; renderAffidavit(); showToast("Signature cleared"); };
    document.getElementById('saveSignatureBtn').onclick = () => { if(signaturePad.isEmpty()) { showToast("Please draw signature first", true); return; } backupSignature(); renderAffidavit(); showToast("Signature saved"); };

    // ======================== AFFIDAVIT RENDERING ========================
    let currentDocID = "", totalDocs = 0, totalExports = 0, history = [], qrInstance = null;
    let debounceTimer = null, saveTimer = null;
    function getToday() { return new Date().toLocaleDateString('en-GB'); }
    function validateFields() { let valid = true; ['fullName','fatherName','address'].forEach(id => { const el = document.getElementById(id); if(!el.value.trim()) { el.classList.add('error'); valid=false; } else el.classList.remove('error'); }); if(!valid) showToast("Please fill required fields", true); return valid; }
    function enhanceStatement(text, country) {
      if(!document.getElementById('aiEnhanceToggle').checked) return text;
      let enhanced = text.replace(/declare/gi, 'solemnly declare under oath').replace(/true/gi, 'true and correct');
      if(country === 'UAE') enhanced += " according to UAE Federal Law No. 5/1985.";
      else if(country === 'India') enhanced += " under the Indian Evidence Act, 1872.";
      return enhanced;
    }
    function renderAffidavit() {
      if(!validateFields()) return;
      const lang = getLang(); const t = translations[lang];
      let name = sanitize(document.getElementById('fullName').value.trim()); if(!name) name = "Deponent";
      let father = sanitize(document.getElementById('fatherName').value.trim()); if(!father) father = "N/A";
      let address = sanitize(document.getElementById('address').value.trim()); if(!address) address = "Not Provided";
      let statement = enhanceStatement(sanitize(document.getElementById('swornStatement').value), document.getElementById('countrySelect').value);
      const purpose = sanitize(document.getElementById('purposeDropdown').value);
      const country = sanitize(document.getElementById('countrySelect').value);
      const template = document.getElementById('templateSelect').value;
      const dateStr = getToday();
      let content = `<div style="text-align:center;"><h1>${t.title}</h1><p>${t.notary}</p></div>`;
      if(template==='court') content = `<div style="border:2px solid #333; padding:1rem;">${content}`;
      else if(template==='modern') content = `<div style="background:#f9f3e7; padding:1rem;">${content}`;
      else if(template==='compact') content = `<div style="font-size:0.9rem;">${content}`;
      content += `<p>${t.intro.replace('{name}',name).replace('{father}',father).replace('{address}',address)}</p>`;
      content += `<p>${t.c1}</p><p>${t.c2.replace('{purpose}',purpose)}</p><p>${t.c3.replace('{statement}',statement)}</p><p>${t.c4}</p>`;
      content += `<p>${t.verified.replace('{country}',country)}</p>`;
      content += `<div style="display:flex; justify-content:space-between; margin:20px 0;"><span>${t.place}</span><span>${t.date.replace('{date}',dateStr)}</span></div>`;
      content += `<div class="signature-grid"><div class="signature-col"><div class="signature-line"></div><div>${t.leftSig}</div>${currentSignatureDataURL ? `<img src="${currentSignatureDataURL}" style="max-width:100%; margin-top:5px;">` : `<div style="height:30px;"></div>`}</div>`;
      content += `<div class="signature-col"><div class="signature-line"></div><div>${t.rightSig}</div></div></div>`;
      content += `<div style="font-weight:bold; text-align:right; margin-top:15px;">Notary Reg: ${((currentDocID || "AGI-0000").slice(-6))}</div>`;
      if(template!=='standard') content += `</div>`;
      document.getElementById('dynamicAffidavitContent').innerHTML = content;
      document.getElementById('affidavitContainer').setAttribute('dir', lang==='ar' ? 'rtl' : 'ltr');
      document.getElementById('docFooter').innerHTML = `${t.footer} ${currentDocID} • AGI PRO`;
      // QR
      const qrDiv = document.getElementById('qrArea');
      const qrText = `AGI:${currentDocID}|${name}|${country}`;
      if (!qrInstance) { while(qrDiv.firstChild) qrDiv.removeChild(qrDiv.firstChild); qrInstance = new QRCode(qrDiv, { text: qrText, width: 90, height: 90, correctLevel: QRCode.CorrectLevel.H }); }
      else { qrInstance.clear(); qrInstance.makeCode(qrText); }
      // watermark & seal
      document.getElementById('watermarkElem').style.display = document.getElementById('watermarkToggle').checked ? 'block' : 'none';
      const seal = document.getElementById('sealColorSelect').value;
      const stampDiv = document.getElementById('stampElem'); stampDiv.className = `stamp ${seal}`;
      stampDiv.innerText = seal==='gold' ? '⚖️ NOTARY GOLD SEAL' : (seal==='blue' ? '🔵 NOTARY SEAL' : '📜 NOTARY SEAL');
      // autosave draft
      if(saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => { const draft = { name, father, address, country, purpose, statement, docID: currentDocID, signature: currentSignatureDataURL, template, sealColor: seal, watermark: document.getElementById('watermarkToggle').checked }; localStorage.setItem("draftAffidavit", JSON.stringify(draft)); const badge = document.getElementById('saveBadge'); badge.style.display = 'inline-block'; setTimeout(() => badge.style.display = 'none', 800); }, 500);
    }

    // ======================== GENERATE NEW ID & HISTORY ========================
    function addToHistory() {
      history.unshift({ id: currentDocID, name: document.getElementById('fullName').value, date: new Date().toISOString(), purpose: document.getElementById('purposeDropdown').value });
      if(history.length>10) history.pop();
      localStorage.setItem("affidavitHistory", JSON.stringify(history));
      renderHistory();
    }
    function renderHistory() {
      const container = document.getElementById('historyContainer');
      container.innerHTML = '';
      history.forEach(h => {
        const div = document.createElement('div'); div.className = 'history-item'; div.innerText = `${h.id.slice(-8)} - ${h.name}`;
        div.onclick = () => { document.getElementById('fullName').value = h.name; document.getElementById('purposeDropdown').value = h.purpose; renderAffidavit(); showToast("Restored from history"); };
        container.appendChild(div);
      });
    }
    function generateNewID() { if(!validateFields()) return; currentDocID = "AGI-"+Date.now()+"-"+Math.floor(Math.random()*10000); renderAffidavit(); totalDocs++; localStorage.setItem("totalAffidavits", totalDocs); addToHistory(); updateAnalytics(); showToast("New ID created"); }
    function updateAnalytics() {
      document.getElementById('totalDocsCount').innerText = totalDocs;
      document.getElementById('totalExportsCount').innerText = totalExports;
      if(history.length) {
        const purposes = history.map(h => h.purpose);
        const freq = purposes.reduce((acc, p) => { acc[p] = (acc[p]||0)+1; return acc; }, {});
        const top = Object.keys(freq).reduce((a,b) => freq[a] > freq[b] ? a : b, '');
        document.getElementById('topPurpose').innerText = top || '-';
      }
    }
    function recoverDraft() {
      const draft = localStorage.getItem("draftAffidavit");
      if(draft) {
        try {
          const d = JSON.parse(draft);
          document.getElementById('fullName').value = d.name; document.getElementById('fatherName').value = d.father;
          document.getElementById('address').value = d.address; document.getElementById('countrySelect').value = d.country;
          if(d.purpose) document.getElementById('purposeDropdown').value = d.purpose;
          document.getElementById('swornStatement').value = d.statement;
          currentDocID = d.docID || ("AGI-"+Date.now()+"-"+Math.floor(Math.random()*10000));
          currentSignatureDataURL = d.signature || "";
          if(d.template) document.getElementById('templateSelect').value = d.template;
          if(d.sealColor) document.getElementById('sealColorSelect').value = d.sealColor;
          document.getElementById('watermarkToggle').checked = d.watermark !== false;
          renderAffidavit();
          showToast("Draft restored");
        } catch(e) {}
      } else { currentDocID = "AGI-"+Date.now()+"-"+Math.floor(Math.random()*10000); renderAffidavit(); }
    }

    // ======================== EXPORT FUNCTIONS ========================
    async function withLoading(fn, successMsg) {
      const overlay = document.createElement('div'); overlay.className = 'loading-overlay'; overlay.innerHTML = '<div class="spinner"></div><div>Processing...</div>'; overlay.style.position='fixed'; overlay.style.top=0; overlay.style.left=0; overlay.style.width='100%'; overlay.style.height='100%'; overlay.style.background='rgba(0,0,0,0.7)'; overlay.style.zIndex=9999; overlay.style.display='flex'; overlay.style.justifyContent='center'; overlay.style.alignItems='center'; overlay.style.flexDirection='column'; document.body.appendChild(overlay);
      try { await fn(); totalExports++; localStorage.setItem("totalExports", totalExports); updateAnalytics(); showToast(successMsg); } catch(e) { showToast("Export failed", true); } finally { overlay.remove(); }
    }
    document.getElementById('pdfExportBtn').addEventListener('click', () => withLoading(async () => {
      const quality = document.getElementById('qualitySelect').value;
      const scale = quality==='ultra'?4:(quality==='high'?3:2);
      const element = document.getElementById('affidavitContainer');
      await html2pdf().from(element).set({ margin: 0.4, filename: `Affidavit_${currentDocID}.pdf`, html2canvas: { scale, useCORS: true, letterRendering: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).save();
    }, "PDF ready"));
    document.getElementById('pngExportBtn').addEventListener('click', () => withLoading(async () => {
      const quality = document.getElementById('qualitySelect').value;
      const scale = quality==='ultra'?4:(quality==='high'?3:2);
      const canvas = await html2canvas(document.getElementById('affidavitContainer'), { scale, backgroundColor: '#ffffff', useCORS: true, letterRendering: true });
      const link = document.createElement('a'); link.download = `affidavit_${currentDocID}.png`; link.href = canvas.toDataURL(); link.click();
    }, "PNG saved"));
    document.getElementById('copyTextBtn').addEventListener('click', () => { const text = document.getElementById('dynamicAffidavitContent').innerText; navigator.clipboard.writeText(text); showToast("Copied"); });
    document.getElementById('printNowBtn').addEventListener('click', () => window.print());

    // ======================== THEME, NAVIGATION, OFFLINE ========================
    document.getElementById('themeToggleBtn').addEventListener('click', () => { document.body.classList.toggle('light'); localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark'); });
    if(localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    document.getElementById('freeVersionBtn').onclick = () => window.location.href = 'free.html';
    document.getElementById('premiumVersionBtn').onclick = () => window.location.href = 'premium.html';
    document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); alert("Logged out"); location.reload(); };
    document.getElementById('generateAffidavitBtn').onclick = generateNewID;
    document.getElementById('mobileGenerateBtn').onclick = generateNewID;
    document.getElementById('watermarkToggle').addEventListener('change', () => renderAffidavit());
    document.getElementById('sealColorSelect').addEventListener('change', () => renderAffidavit());
    document.getElementById('templateSelect').addEventListener('change', () => renderAffidavit());
    ['fullName','fatherName','address','countrySelect','swornStatement'].forEach(id => document.getElementById(id).addEventListener('input', () => { if(debounceTimer) clearTimeout(debounceTimer); debounceTimer = setTimeout(() => renderAffidavit(), 300); }));
    document.getElementById('purposeDropdown').addEventListener('change', () => renderAffidavit());
    window.addEventListener('online', () => { document.getElementById('offlineBanner').style.display = 'none'; showToast("Online"); });
    window.addEventListener('offline', () => { document.getElementById('offlineBanner').style.display = 'block'; showToast("Offline", true); });

    // ======================== INIT ========================
    function init() {
      totalDocs = parseInt(localStorage.getItem("totalAffidavits") || "0");
      totalExports = parseInt(localStorage.getItem("totalExports") || "0");
      history = JSON.parse(localStorage.getItem("affidavitHistory") || "[]");
      updateAnalytics();
      renderHistory();
      populatePurposes('');
      recoverDraft();
    }
    init();
  })();
</script>
<style>
  .loading-overlay .spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid var(--gold);
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 1rem;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</body>
</html>
