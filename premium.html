padding:24px;
border-radius:24px;

}

.label{

font-weight:700;
}

.input,
.select,
.textarea{

padding:14px;
border:none;

background:#1f2937;

outline:none;
font-size:14px;
}

.textarea{

resize:vertical;
}

#signaturePad{

height:180px;

}

.btn-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.analytics{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:18px;
margin-bottom:25px;
}

.card{
background:#111827;
padding:22px;
border-radius:22px;
text-align:center;
}

.card h3{
font-size:30px;
margin-top:10px;
}

.preview{
background:white;
color:#111827;
border-radius:24px;
padding:45px;
position:relative;
overflow:hidden;
min-height:900px;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:
translate(-50%,-50%)
rotate(-30deg);

font-size:90px;
font-weight:800;
color:rgba(0,0,0,.04);
pointer-events:none;
}

.stamp{
position:absolute;
top:25px;
right:25px;
width:90px;
height:90px;
border:3px solid #dc2626;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
font-size:20px;
color:#dc2626;
transform:rotate(-15deg);
}

.doc-title{
text-align:center;
font-size:48px;
font-family:'Cormorant Garamond',serif;
margin-top:20px;
}

.doc-sub{
text-align:center;
margin-top:10px;
margin-bottom:30px;
letter-spacing:2px;
}

.doc-content{
line-height:1.9;
font-size:18px;
}

.signature-box{
margin-top:40px;
}

#qrCodeContainer{
display:flex;
justify-content:center;
margin-top:30px;
}

.doc-footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#666;
}

.premium-badge{
background:linear-gradient(135deg,#f59e0b,#facc15);
color:#111827;
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:800;
display:inline-block;
margin-top:10px;
}

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
}

.sidebar{
position:relative;
top:0;
}

.preview{
padding:22px;
min-height:auto;
}

}

@media(max-width:768px){

.main{
padding:14px;
}

.top-actions{
display:grid;
grid-template-columns:1fr 1fr;
width:100%;
}

.btn-grid{
grid-template-columns:1fr;
}

.doc-title{
font-size:34px;
}

.watermark{
font-size:55px;
}

.preview{
padding:18px;
}

}

<div class="topbar">

Logout

</div>

</div>

<div class="main">

<div class="sidebar">

<h2>
Generate Premium Affidavit
</h2>

<label class="label">
Language
</label>

<select
class="select"
id="lang">

<option>Arabic</option>

</select>

Country
</label>

id="country">

Purpose
</label>

class="select"
id="purposeType">

👑

🤖

<p>Smart Engine</p>
</div>

</div>

<div class="watermark">
AGI PREMIUM
</div>

<div id="previewArea">

<div class="stamp">
₹100
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>
Premium affidavit preview will appear here.
</p>

</div>

<script>

let signaturePad;
let totalDocs = 0;

window.onload = ()=>{

initializeSignaturePad();

};

function initializeSignaturePad(){

const canvas =
document.getElementById(
"signaturePad"
);

resizeCanvas();

signaturePad =
new SignaturePad(canvas,{
backgroundColor:"white",
penColor:"black"
});

window.addEventListener(
"resize",
resizeCanvas
);

}

function resizeCanvas(){

const canvas =
document.getElementById(
"signaturePad"
);

const ratio =
Math.max(
window.devicePixelRatio || 1,
1
);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
180 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

}

function clearSignature(){

signaturePad.clear();

}

function generateDocID(){

return "PREM-AFF-" +
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

function generateAffidavit(){

const lang =
document.getElementById("lang").value;

const country =
document.getElementById("country").value;

const name =
document.getElementById("name").value;

const father =
document.getElementById("father").value;

const age =
document.getElementById("age").value;

const address =
document.getElementById("address").value;

const details =
document.getElementById("details").value;

const purpose =
document.getElementById("purposeType").value;

if(!name || !father || !age){

alert("Fill required fields ❌");

return;

}

let affidavitText = "";

if(lang==="Urdu"){

affidavitText =
`میں ${name} ولد ${father} عمر ${age} سال حلفیہ بیان دیتا ہوں۔`;

}
else if(lang==="Hindi"){

affidavitText =
`मैं ${name}, पिता ${father}, उम्र ${age} वर्ष शपथपूर्वक घोषणा करता हूँ।`;

}
else if(lang==="Arabic"){

affidavitText =
`أنا ${name} ابن ${father} أقر بأن عمري ${age} سنة.`;

}
else{

affidavitText =
`I, ${name}, S/o ${father}, aged about ${age} years, do hereby solemnly affirm.`;

}

const signature =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

const docID =
generateDocID();

document.getElementById(
"previewArea"
).innerHTML = `

<div class="stamp">
₹100
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>${affidavitText}</p>

<p>
Country:
<b>${country}</b>
</p>

<p>
Purpose:
<b>${purpose}</b>
</p>

<p>
Address:
<b>${address}</b>
</p>

<p>
${details}
</p>

<div class="signature-box">

${
signature
?
`<img
src="${signature}"
style="
height:90px;
max-width:220px;
">`
:
""
}

</div>

<div id="qrCodeContainer"></div>

<div class="doc-footer">

${docID}

<br><br>

Powered by AGI ULTRA PREMIUM

</div>

</div>

`;

generateQRCode(docID);

totalDocs++;

document.getElementById(
"totalDocs"
).innerText =
totalDocs;

}

function generateQRCode(docID){

const qr =
document.getElementById(
"qrCodeContainer"
);

qr.innerHTML = "";

new QRCode(qr,{
text:
location.origin +
"/verify.html?id=" +
docID,
width:140,
height:140
});

}

function downloadPDF(){

html2pdf()
.set({
margin:5,
filename:"Premium-Affidavit.pdf",
image:{
type:"jpeg",
quality:1
},
html2canvas:{
scale:2
},
jsPDF:{
unit:"mm",
format:"a4"
}
})
.from(
document.getElementById(
"previewArea"
)
)
.save();

}

function exportPNG(){

html2canvas(
document.getElementById(
"previewArea"
)
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"premium-affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

function shareWhatsApp(){

const text =
document.getElementById(
"previewArea"
).innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

function logoutUser(){

localStorage.removeItem(
"user"
);

alert(
"Logged Out 🚪"
);

location.href =
"login.html";

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./sw.js"
);

}

</script>

</body>
