<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affidavit SaaS PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
.container{max-width:400px;margin:auto;padding:20px}
input{width:90%;padding:10px;margin:10px}
button{padding:12px 20px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.signup{background:#28a745}
.login{background:#007bff}
.buy{background:#ff9800}
.withdraw{background:#e91e63}
.admin{background:#9c27b0}
</style>

</head>

<body>

<div class="container">

<h2>🚀 Affidavit SaaS PRO</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="signup" onclick="signup()">Signup</button>
<button class="login" onclick="login()">Login</button>

<hr>

<input id="ref" placeholder="Referral Code (optional)">
<button class="buy" onclick="buy()">Buy Premium ₹99</button>

<hr>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>
<input id="amount" placeholder="Withdraw Amount">
<button class="withdraw" onclick="withdraw()">Withdraw</button>

<hr>

<button class="admin" onclick="adminPanel()">Admin Panel</button>

<h3 id="status">Checking...</h3>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC_1bKbNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.firebasestorage.app",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");

// ================= SIGNUP =================
function signup(){

  let email = emailEl.value.trim();
  let password = passwordEl.value.trim();

  if(!email || !password){
    alert("Fill all fields ❗");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
  .then(async res=>{

    let uid = res.user.uid;
    let referral = uid.substring(0,6);

    await db.collection("users").doc(uid).set({
      premium:false,
      wallet:0,
      referral: referral,
      usedReferral:false,
      isAdmin:false
    });

    alert("Signup Success ✅");
  })
  .catch(err=>alert(err.message));
}

// ================= LOGIN =================
function login(){
  auth.signInWithEmailAndPassword(emailEl.value, passwordEl.value)
  .then(()=> alert("Login Success ✅"))
  .catch(err=>alert(err.message));
}

// ================= AUTH =================
auth.onAuthStateChanged(async user=>{
  if(user){
    document.getElementById("status").innerText = "Logged In ✅";

    let doc = await db.collection("users").doc(user.uid).get();
    let data = doc.data();
    document.getElementById("wallet").innerText = data.wallet || 0;

  } else {
    document.getElementById("status").innerText = "Not Logged In ❌";
  }
});

// ================= BUY PREMIUM =================
function buy(){

  let user = auth.currentUser;
  let refInput = document.getElementById("ref").value.trim();

  if(!user){
    alert("Login first ❗");
    return;
  }

  var options = {
    key: "rzp_test_xxxxxxxx",
    amount: 9900,
    currency: "INR",

    handler: async function (){

      let expiry = Date.now() + (30*24*60*60*1000);

      let userRef = db.collection("users").doc(user.uid);
      let userData = (await userRef.get()).data();

      await userRef.update({
        premium:true,
        expiry:expiry
      });

      // Referral system
      if(refInput && !userData.usedReferral){

        let snap = await db.collection("users")
        .where("referral","==",refInput)
        .get();

        snap.forEach(async doc=>{

          await db.collection("users").doc(doc.id).update({
            wallet: firebase.firestore.FieldValue.increment(20)
          });

          await userRef.update({
            wallet: firebase.firestore.FieldValue.increment(10),
            usedReferral:true
          });

        });
      }

      alert("Premium Activated 🚀");
    }
  };

  new Razorpay(options).open();
}

// ================= WITHDRAW =================
async function withdraw(){

  let user = auth.currentUser;
  let amount = parseInt(document.getElementById("amount").value);

  if(!user || !amount){
    alert("Invalid ❗");
    return;
  }

  let userRef = db.collection("users").doc(user.uid);
  let data = (await userRef.get()).data();

  if(data.wallet < amount){
    alert("Low balance ❌");
    return;
  }

  // deduct
  await userRef.update({
    wallet: data.wallet - amount
  });

  // save request
  await db.collection("withdraws").add({
    uid:user.uid,
    amount:amount,
    status:"pending",
    time:Date.now()
  });

  alert("Withdraw request sent ✅");
}

// ================= ADMIN PANEL =================
async function adminPanel(){

  let user = auth.currentUser;
  if(!user) return;

  let doc = await db.collection("users").doc(user.uid).get();

  if(!doc.data().isAdmin){
    alert("Not admin ❌");
    return;
  }

  let requests = await db.collection("withdraws")
  .where("status","==","pending")
  .get();

  requests.forEach(async req=>{
    await db.collection("withdraws").doc(req.id).update({
      status:"approved"
    });
  });

  alert("All withdraws approved ✅");
}

</script>

</body>
</html>
