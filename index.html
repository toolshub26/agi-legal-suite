<script>

let signaturePad;
let totalDocs = 0;
let deferredPrompt = null;

window.onload = ()=>{

initializeSignaturePad();

};

function initializeSignaturePad(){

const canvas =
document.getElementById(
"signaturePad"
);

resizeCanvas();

signaturePad =
new SignaturePad(canvas,{

backgroundColor:"white",
penColor:"black"

});

window.addEventListener(
"resize",
resizeCanvas
);

}

function resizeCanvas(){

const canvas =
document.getElementById(
"signaturePad"
);

const ratio =
Math.max(
window.devicePixelRatio || 1,
1
);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
180 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

}

function clearSignature(){

signaturePad.clear();

}

function generateAffidavit(){

const name =
document.getElementById(
"name"
).value;

const father =
document.getElementById(
"father"
).value;

const age =
document.getElementById(
"age"
).value;

const details =
document.getElementById(
"details"
).value;

let purpose =
document.getElementById(
"purposeType"
).value;

if(purpose === "Custom Purpose"){

const customPurpose =
prompt(
"Enter Custom Affidavit Purpose"
);

if(customPurpose){

purpose = customPurpose;

}

}

if(!name || !father || !age){

alert(
"Fill required fields ❌"
);

return;

}

const signature =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

document.getElementById(
"previewArea"
).innerHTML = `

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>
I,
<b>${name}</b>,
S/o
<b>${father}</b>,
aged about
<b>${age}</b>
years.
</p>

<p>
Purpose:
<b>${purpose}</b>
</p>

<p>
${details}
</p>

<div class="signature-box">

${
signature
?
`<img
src="${signature}"
style="
height:90px;
max-width:220px;
object-fit:contain;
">`
:
""
}

</div>

<div id="qrCodeContainer"
style="
margin-top:30px;
display:flex;
justify-content:center;
">
</div>

</div>

`;

generateQRCode();

totalDocs++;

document.getElementById(
"totalDocs"
).innerText =
totalDocs;

}

function generateQRCode(){

const qr =
document.getElementById(
"qrCodeContainer"
);

if(!qr) return;

qr.innerHTML = "";

new QRCode(qr,{

text:
location.href,

width:140,
height:140

});

}

function downloadPDF(){

html2pdf()
.from(
document.getElementById(
"previewArea"
)
)
.save(
"Affidavit.pdf"
);

}

function exportPNG(){

html2canvas(
document.getElementById(
"previewArea"
)
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

function shareWhatsApp(){

const text =
document.getElementById(
"previewArea"
).innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

window.addEventListener(
"beforeinstallprompt",
(e)=>{

e.preventDefault();

deferredPrompt = e;

});

async function triggerInstallApp(){

if(!deferredPrompt){

alert(
"Open in Chrome → Add to Home Screen"
);

return;

}

deferredPrompt.prompt();

await deferredPrompt.userChoice;

deferredPrompt = null;

}

if("serviceWorker" in navigator){

window.addEventListener(
"load",
()=>{

navigator.serviceWorker.register(
"./sw.js"
);

});

}

</script>
