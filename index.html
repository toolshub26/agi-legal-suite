<script>

let signaturePad;
let totalDocs = 0;
let lastDocId = "";

/* LOAD */

window.onload = ()=>{

const canvas =
document.getElementById(
"signaturePad"
);

const ratio =
Math.max(
window.devicePixelRatio || 1,
1
);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
200 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

signaturePad =
new SignaturePad(canvas,{
backgroundColor:"white",
penColor:"black"
});

};

/* SIGNATURE */

function clearSignature(){
signaturePad.clear();
}

/* DOC ID */

function generateDocID(){

return "IND-AFF-" +
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

/* GENERATE */

function generateAffidavit(){

const lang =
document.getElementById("lang").value;

const country =
document.getElementById("country").value;

const purpose =
document.getElementById("purposeType").value;

const name =
document.getElementById("name").value;

const father =
document.getElementById("father").value;

const age =
document.getElementById("age").value;

const address =
document.getElementById("address").value;

const details =
document.getElementById("details").value;

if(!name || !father || !age){

alert("Fill required fields ❌");

return;

}

let affidavitText = "";

if(lang==="Urdu"){

affidavitText =
`میں ${name} ولد ${father} عمر ${age} سال حلفیہ بیان دیتا ہوں۔`;

}
else if(lang==="Hindi"){

affidavitText =
`मैं ${name}, पिता ${father}, उम्र ${age} वर्ष शपथपूर्वक घोषणा करता हूँ।`;

}
else if(lang==="Arabic"){

affidavitText =
`أنا ${name} ابن ${father} أقر بأن عمري ${age} سنة.`;

}
else{

affidavitText =
`I, ${name}, S/o ${father}, aged about ${age} years, resident of ${address}, do hereby solemnly affirm and declare as under.`;

}

const signature =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

const docID =
generateDocID();

lastDocId = docID;

document.getElementById(
"previewArea"
).innerHTML = `

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>
${affidavitText}
</p>

<p>
<b>Country:</b>
${country}
</p>

<p>
<b>Purpose:</b>
${purpose}
</p>

<p>
${details}
</p>

${
signature
?
`
<div class="signature-box">
<img src="${signature}"
style="height:90px;">
</div>
`
:
""
}

<div id="qrCodeContainer">
</div>

<div class="doc-footer">

${docID}

<br><br>

Powered by AGI ULTRA FREE

</div>

</div>

`;

generateQRCode(docID);

localStorage.setItem(
"doc_" + docID,
JSON.stringify({
name,
purpose,
country,
date:new Date().toLocaleDateString()
})
);

totalDocs++;

document.getElementById(
"totalDocs"
).innerText =
totalDocs;

}

/* QR */

function generateQRCode(docID){

const qr =
document.getElementById(
"qrCodeContainer"
);

qr.innerHTML = "";

new QRCode(qr,{
text:
location.origin +
"/verify.html?id=" +
docID,
width:140,
height:140
});

}

/* PDF */

function downloadPDF(){

html2pdf()
.set({
margin:5,
filename:"Affidavit.pdf",
image:{
type:"jpeg",
quality:1
},
html2canvas:{
scale:2
},
jsPDF:{
unit:"mm",
format:"a4"
}
})
.from(
document.getElementById(
"previewArea"
)
)
.save();

}

/* PNG */

function exportPNG(){

html2canvas(
document.getElementById(
"previewArea"
)
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

/* SHARE */

function shareWhatsApp(){

const text =
document.getElementById(
"previewArea"
).innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

/* THEME */

function toggleTheme(){

document.body.classList.toggle(
"light-mode"
);

}
