/* BUTTON GRID */

grid-template-columns:1fr 1fr;
gap:12px;

margin-bottom:20px;

/* SIGNATURE */

height:180px;
background:white;

margin-top:10px;

}

/* ANALYTICS */

.analytics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat{
background:#111827;
padding:20px;
border-radius:22px;
text-align:center;
}

.stat h3{
font-size:30px;
margin-top:10px;
}

/* PREVIEW */

.preview{
background:white;
color:#111827;
border-radius:24px;
padding:20px;
position:relative;
overflow:hidden;
}

#previewArea{
width:100%;
max-width:794px;
min-height:1123px;
margin:auto;
background:white;
padding:40px;
overflow:hidden;
position:relative;
}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);
font-size:90px;
font-weight:800;
color:rgba(0,0,0,.04);
pointer-events:none;
}

.stamp{
position:absolute;
top:25px;
right:25px;
width:90px;
height:90px;
border:3px solid #dc2626;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:800;
color:#dc2626;
transform:rotate(-15deg);
}

.doc-title{
text-align:center;
font-size:46px;
font-family:'Cormorant Garamond',serif;
margin-top:20px;
}

.doc-sub{
text-align:center;
margin-top:10px;
margin-bottom:30px;
letter-spacing:2px;
}

.doc-content{
line-height:1.6;
font-size:16px;
word-break:break-word;
}

.signature-box{
margin-top:30px;
display:flex;
justify-content:flex-start;
}

.signature-box img{
max-width:180px;
height:auto;
}

.doc-footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#666;
}

#qrCodeContainer{
margin-top:25px;
display:flex;
justify-content:center;
}

/* RESPONSIVE */

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
}

.sidebar{
position:relative;
top:0;
max-height:none;
}

.btn-grid{
grid-template-columns:1fr;
}

.preview{
padding:10px;
}

}

@media(max-width:768px){

padding:14px;
gap:20px;
}

.preview{
padding:10px;
}

#previewArea{
padding:20px;
}

.doc-title{
font-size:32px;
}

.watermark{
font-size:50px;
}

.top-actions{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

}

/* PRINT */

@media print{

body *{
visibility:hidden;
}

#previewArea,
#previewArea *{
visibility:visible;
}

#previewArea{
position:absolute;
left:0;
top:0;
width:100%;
padding:20px;
}

.topbar,
.sidebar,
.analytics{
display:none !important;
}

}

<script>

let signaturePad;
let totalDocs = 0;
let lastDocId = "";

/* LOAD */

window.onload = ()=>{

initializeSignaturePad();
loadHistory();

};

/* SIGNATURE */

function initializeSignaturePad(){

const canvas =
document.getElementById("signaturePad");

signaturePad =
new SignaturePad(canvas,{
backgroundColor:"white",
penColor:"black"
});

}

function clearSignature(){
signaturePad.clear();
}

/* DOC ID */

function generateDocID(){

return "IND-AFF-" +
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

/* GENERATE */

function generateAffidavit(){

const lang =
document.getElementById("lang").value;

const country =
document.getElementById("country").value;

const name =
document.getElementById("name").value;

const father =
document.getElementById("father").value;

const age =
document.getElementById("age").value;

const details =
document.getElementById("details").value;

const purpose =
document.getElementById("purposeType").value;

if(!name || !father || !age){

alert("Fill required fields ❌");
return;

}

let affidavitText = "";
let textDirection = "ltr";

if(lang==="Urdu"){

textDirection = "rtl";

affidavitText = `
میں ${name} ولد ${father}
عمر ${age} سال
یہ حلفیہ بیان دیتا ہوں کہ:

1۔ یہ بیان ${purpose} کے لئے دیا جا رہا ہے۔

2۔ ${details}

3۔ تمام معلومات درست ہیں۔
`;

}
else if(lang==="Hindi"){

affidavitText = `
मैं ${name},
पिता ${father},
उम्र ${age} वर्ष
शपथपूर्वक घोषणा करता हूँ कि:

1. यह शपथ पत्र ${purpose} हेतु दिया जा रहा है।

2. ${details}

3. सभी जानकारी सत्य है।
`;

}
else if(lang==="Arabic"){

textDirection = "rtl";

affidavitText = `
أنا ${name}
ابن ${father}
وعمري ${age} سنة
أقر بما يلي:

1. تم إصدار هذا الإقرار لغرض ${purpose}

2. ${details}

3. جميع المعلومات صحيحة.
`;

}
else{

affidavitText = `
I, ${name},
S/o ${father},
aged about ${age} years,
do hereby solemnly affirm:

1. This affidavit is submitted for ${purpose}.

2. ${details}

3. All statements are true and correct.
`;

}

const signature =
signaturePad.isEmpty()
?
""
:
signaturePad.toDataURL();

const docID =
generateDocID();

lastDocId = docID;

document.getElementById("previewArea").innerHTML = `

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content"
dir="${textDirection}">

<p>
${affidavitText.replace(/\n/g,"<br>")}
</p>

<p>
<b>Country:</b>
${country}
</p>

<div class="signature-box">

${
signature
?
`<img
src="${signature}">
`
:
""
}

</div>

<div id="qrCodeContainer"></div>

<div class="doc-footer">

${docID}

<br><br>

Powered by AGI ULTRA PRO v18

</div>

</div>

`;

generateQRCode(docID);

localStorage.setItem(
"doc_" + docID,
JSON.stringify({
name,
purpose,
country,
date:new Date().toLocaleDateString()
})
);

saveHistory(docID,name);

totalDocs++;

document.getElementById("totalDocs").innerText =
totalDocs;

}

/* HISTORY */

function saveHistory(id,name){

let history =
JSON.parse(
localStorage.getItem("agiHistory") || "[]"
);

history.unshift({
id,
name
});

localStorage.setItem(
"agiHistory",
JSON.stringify(history)
);

}

function loadHistory(){

let history =
JSON.parse(
localStorage.getItem("agiHistory") || "[]"
);

document.getElementById("totalDocs").innerText =
history.length;

}

/* QR */

function generateQRCode(docID){

const qr =
document.getElementById("qrCodeContainer");

if(!qr) return;

qr.innerHTML = "";

new QRCode(qr,{
text:
location.origin +
"/verify.html?id=" +
docID,
width:140,
height:140
});

}

/* PDF */

function downloadPDF(){

const element =
document.getElementById(
"previewArea"
);

const options = {

margin:0,

filename:
"Affidavit.pdf",

image:{
type:"jpeg",
quality:1
},

html2canvas:{
scale:2,
useCORS:true
},

jsPDF:{
unit:"pt",
format:"a4",
orientation:"portrait"
},

pagebreak:{
mode:["avoid-all"]
}

};

html2pdf()
.set(options)
.from(element)
.save();

}

/* PNG */

function exportPNG(){

html2canvas(
document.getElementById("previewArea")
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

/* WHATSAPP */

function shareWhatsApp(){

const text =
document.getElementById("previewArea").innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

/* DELETE */

function deleteHistory(){

localStorage.removeItem("agiHistory");

alert("History Deleted 🗑️");

location.reload();

}
