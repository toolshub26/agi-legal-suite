<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGI Affidavit PRO</title>

<!-- ✅ QR CODE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;text-align:center}
.container{max-width:420px;margin:auto;padding:20px}
input,select{width:90%;padding:10px;margin:6px;border-radius:6px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.locked{opacity:0.5}
</style>
</head>

<body>

<div class="container">

<h2>📄 Affidavit Generator PRO</h2>

<div id="premiumStatus"></div>

<input id="name" placeholder="Name">
<input id="father" placeholder="Father Name">
<input id="age" placeholder="Age">
<input id="address" placeholder="Address">
<input id="purpose" placeholder="Purpose">
<input id="place" placeholder="Place">
<input id="date" type="date">

<select id="template">
<option value="general">Free Template</option>
<option value="premium">Premium Template</option>
</select>

<button onclick="generateAffidavit()">Generate</button>
<button onclick="downloadPDF()" id="downloadBtn">Download</button>
<button onclick="unlockPremium()">Buy Premium</button>
<button onclick="activatePremiumManually()">Enter Code</button>

<hr>

<div id="previewArea"></div>

<hr>

<h3>📜 History</h3>
<div id="history"></div>

</div>

<!-- 🔥 FIREBASE V9 -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// ✅ CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================================
   AGI ENGINE FINAL v9 🚀
========================================= */

const AGI = {
    premium:false,
    premiumCode:"INDIA49",
    docPrefix:"IND-AFF-",
    premiumDays:30,
    domain:location.origin
};

/* INIT */
(function(){
    let p = localStorage.getItem("agiPremium");
    let exp = parseInt(localStorage.getItem("agiExpiry"));

    AGI.premium = (p==="true" && exp && Date.now()<exp);

    restoreDraft();
    updateUI();
    loadHistory();
})();

/* PREMIUM */
window.unlockPremium = ()=> {
    window.open("https://rzp.io/l/YOUR_PAYMENT_LINK","_blank");
};

window.activatePremiumManually = ()=>{
    let code = prompt("Enter Premium Code:");
    if(code===AGI.premiumCode){
        let expiry = Date.now()+(AGI.premiumDays*86400000);
        localStorage.setItem("agiPremium","true");
        localStorage.setItem("agiExpiry",expiry);
        alert("Premium Activated ✔");
        location.reload();
    } else alert("Invalid Code ❌");
};

/* UI */
function updateUI(){
    let badge = document.getElementById("premiumStatus");
    let btn = document.getElementById("downloadBtn");

    if(AGI.premium){
        badge.innerHTML="🟢 Premium Active";
        btn.classList.remove("locked");
    } else {
        badge.innerHTML="🔴 Free Mode";
        btn.classList.add("locked");
    }
}

/* DRAFT */
const fields=["name","father","age","address","purpose","place","date","template"];

function restoreDraft(){
    fields.forEach(id=>{
        let el=document.getElementById(id);
        if(!el) return;
        let val=localStorage.getItem("agi_"+id);
        if(val) el.value=val;
        el.oninput=()=>localStorage.setItem("agi_"+id,el.value);
    });
}

/* DOC ID */
function generateDocID(){
    let d=new Date().toISOString().slice(0,10).replace(/-/g,"");
    let r=Math.random().toString(36).substring(2,6).toUpperCase();
    return `${AGI.docPrefix}${d}-${r}`;
}

/* QR */
function generateQR(id){
    let box=document.getElementById("qrCodeContainer");
    if(!box) return;
    box.innerHTML="";
    new QRCode(box,{text:`${AGI.domain}/verify.html?id=${id}`,width:120,height:120});
}

/* SAVE (FIREBASE + LOCAL) */
async function saveDoc(id,data){
    localStorage.setItem("doc_"+id,JSON.stringify(data));

    let history=JSON.parse(localStorage.getItem("agiHistory")||"[]");
    history.unshift({id,name:data.name,date:data.date});
    localStorage.setItem("agiHistory",JSON.stringify(history));

    // 🔥 FIREBASE SAVE
    try{
        await setDoc(doc(db,"affidavits",id),data);
    }catch(e){}
}

/* HISTORY */
function loadHistory(){
    let box=document.getElementById("history");
    let history=JSON.parse(localStorage.getItem("agiHistory")||"[]");

    if(history.length===0){
        box.innerHTML="No History";
        return;
    }

    box.innerHTML=history.slice(0,5).map(i=>`
        <div>${i.name} (${i.date})<br>ID: ${i.id}</div><hr>
    `).join("");
}

/* VALIDATION */
function validate(d){
    return d.name && d.father && d.age && d.address && d.purpose && d.place && d.date;
}

/* MAIN */
window.generateAffidavit = async ()=>{

    let data={
        name:name.value,
        father:father.value,
        age:age.value,
        address:address.value,
        purpose:purpose.value,
        place:place.value,
        date:date.value,
        template:template.value
    };

    if(!validate(data)) return alert("Fill all fields ❗");

    if(!AGI.premium && data.template!=="general")
        return alert("Premium Template ❌");

    let id=generateDocID();

    let html=AGI.premium?"":"<div style='color:red'>FREE VERSION</div>";

    html+=`
    <h2>AFFIDAVIT</h2>
    <p>I ${data.name}, S/o ${data.father}, age ${data.age}</p>
    <p>${data.address}</p>
    <p>${data.purpose}</p>
    <p>${data.place} - ${data.date}</p>
    `;

    if(AGI.premium){
        html+=`<p><b>ID:</b> ${id}</p><div id="qrCodeContainer"></div>`;
    }

    previewArea.innerHTML=html;

    if(AGI.premium) generateQR(id);

    await saveDoc(id,data);
    loadHistory();
};

/* DOWNLOAD */
window.downloadPDF = ()=>{
    if(!AGI.premium) return alert("Premium Required ❌");
    window.print();
};

</script>

</body>
</html>
