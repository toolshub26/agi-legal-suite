<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="theme-color" content="#0a192f" />

  <meta name="mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>
    AGI ULTRA PRO v28
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />

</head>

<body class="dark">

  <!-- OFFLINE -->
  <div id="offlineBanner"
    class="offline-banner">

    ⚠️ You are offline

  </div>

  <!-- TOPBAR -->
  <header class="topbar">

    <div class="logo-area">

      ⚖️ AGI ULTRA PRO v28

      <span id="modeBadge"
        class="mode-badge">

        PREMIUM

      </span>

    </div>

    <div class="btn-group">

      <button id="freeModeBtn"
        class="glass-btn">

        📄 Free

      </button>

      <button id="premiumModeBtn"
        class="premium-btn">

        👑 Premium

      </button>

      <button id="pdfExportBtn"
        class="glass-btn">

        📑 PDF

      </button>

      <button id="pngExportBtn"
        class="glass-btn">

        🖼️ PNG

      </button>

      <button id="copyTextBtn"
        class="glass-btn">

        📋 Copy

      </button>

      <button id="themeToggleBtn"
        class="glass-btn">

        🌓 Theme

      </button>

      <button id="printNowBtn"
        class="glass-btn">

        🖨️ Print

      </button>

    </div>

  </header>

  <!-- ANALYTICS -->
  <section class="cards-row">

    <div class="analytics-card">

      <h3 id="totalDocsCount">0</h3>

      <p>Total Docs</p>

    </div>

    <div class="analytics-card">

      <h3 id="totalExportsCount">0</h3>

      <p>Exports</p>

    </div>

    <div class="analytics-card">

      <h3 id="topPurpose">-</h3>

      <p>Top Purpose</p>

    </div>

  </section>

  <!-- MAIN -->
  <main class="main-dashboard">

    <!-- LEFT -->
    <section class="form-panel">

      <h2>
        📝 Affidavit Details
      </h2>

      <!-- NAME -->
      <div class="field">

        <label>
          Full Name *
        </label>

        <input type="text"
          id="fullName" />

      </div>

      <!-- FATHER -->
      <div class="field">

        <label>
          Father's Name *
        </label>

        <input type="text"
          id="fatherName" />

      </div>

      <!-- AGE -->
      <div class="field">

        <label>
          Age *
        </label>

        <input type="number"
          id="age" />

      </div>

      <!-- GENDER -->
      <div class="field">

        <label>
          Gender *
        </label>

        <select id="gender">

          <option>Male</option>

          <option>Female</option>

          <option>Other</option>

        </select>

      </div>

      <!-- ADDRESS -->
      <div class="field">

        <label>
          Address *
        </label>

        <input type="text"
          id="address" />

      </div>

      <!-- STATE -->
      <div class="field">

        <label>
          State *
        </label>

        <input type="text"
          id="state" />

      </div>

      <!-- DISTRICT -->
      <div class="field">

        <label>
          District *
        </label>

        <input type="text"
          id="district" />

      </div>

      <!-- COUNTRY -->
      <div class="field">

        <label>
          Country *
        </label>

        <input type="text"
          id="countryInput" />

      </div>

      <!-- ID -->
      <div class="field">

        <label>
          ID Proof Number *
        </label>

        <input type="text"
          id="idNumber" />

      </div>

      <!-- LANGUAGE -->
      <div class="field">

        <label>
          Language
        </label>

        <select id="langSelect">

          <option value="en">
            English
          </option>

          <option value="ur">
            Urdu
          </option>

          <option value="hi">
            Hindi
          </option>

          <option value="ar">
            Arabic
          </option>

        </select>

      </div>

      <!-- PURPOSE -->
      <div class="field">

        <label>
          📌 Purpose
        </label>

        <input type="text"
          id="purposeSearch"
          placeholder="Search purpose..." />

        <div class="purpose-scroll">

          <select id="purposeDropdown"
            size="8"></select>

        </div>

      </div>

      <!-- STATEMENT -->
      <div class="field">

        <label>
          Sworn Statement
        </label>

        <textarea id="swornStatement"
          rows="4"></textarea>

      </div>

      <!-- PHOTO -->
      <div class="field">

        <label>
          Upload Photo
        </label>

        <input type="file"
          id="photoUpload"
          accept="image/*" />

      </div>

      <!-- SETTINGS -->
      <div class="settings-bar">

        <select id="templateSelect">

          <option value="standard">
            Standard
          </option>

          <option value="court">
            Court Format
          </option>

          <option value="modern">
            Modern Legal
          </option>

          <option value="compact">
            Compact
          </option>

        </select>

        <select id="sealColorSelect">

          <option value="red">
            Red Seal
          </option>

          <option value="blue">
            Blue Seal
          </option>

          <option value="gold">
            Gold Seal
          </option>

        </select>

      </div>

      <!-- SIGNATURE -->
      <div class="signature-area">

        <label>
          ✍️ Electronic Signature
        </label>

        <canvas id="signatureCanvas"
          width="500"
          height="150"></canvas>

        <div class="signature-buttons">

          <button id="clearSignatureBtn"
            class="glass-btn">

            Clear

          </button>

          <button id="saveSignatureBtn"
            class="premium-btn">

            Save

          </button>

        </div>

      </div>

      <!-- GENERATE -->
      <button id="generateAffidavitBtn"
        class="generate-btn">

        ✨ GENERATE NEW ID

      </button>

      <!-- HISTORY -->
      <div class="history-list">

        <strong>
          📜 History
        </strong>

        <div id="historyContainer"></div>

      </div>

    </section>

    <!-- RIGHT -->
    <section class="preview-panel">

      <div id="affidavitContainer"
        class="affidavit-paper">

        <div id="watermarkElem"
          class="watermark-text">

          PREMIUM LEGAL

        </div>

        <div id="stampElem"
          class="stamp red">

          📜 NOTARY SEAL

        </div>

        <div id="dynamicAffidavitContent">

        </div>

        <div id="qrArea"
          class="qr-container"></div>

        <div id="docFooter"
          class="footer-note">

          Document ID

        </div>

      </div>

    </section>

  </main>

  <!-- LIBRARIES -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <!-- MAIN SCRIPT -->

  <script src="./script.js"></script>

</body>

</html>
