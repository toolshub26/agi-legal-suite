<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earning SaaS PRO FINAL</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;text-align:center}
.container{max-width:420px;margin:auto;padding:20px}
input{width:90%;padding:10px;margin:8px;border-radius:6px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Earning SaaS FINAL</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<input id="ref" placeholder="Referral Code">
<button onclick="share()">📲 Invite</button>
<button onclick="copy()">Copy Code</button>

<hr>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<button onclick="dailyReward()">🎁 Daily ₹5</button>
<button onclick="task()">📺 Task ₹2</button>

<input id="amount" placeholder="Withdraw Amount">
<button onclick="withdraw()">Withdraw</button>

<hr>

<button onclick="buy()">Buy Premium ₹99</button>
<button onclick="admin()">Admin</button>

<hr>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

<h3 id="status">Checking...</h3>

</div>

<!-- ✅ FIREBASE v9 (MODULE) -->
<script type="module">

// 🔥 IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  increment,
  collection,
  query,
  orderBy,
  limit,
  getDocs
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

// 🔑 CONFIG (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyC_1bkBNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.appspot.com",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= AUTO REF =================
(function(){
 let p=new URLSearchParams(location.search);
 let r=p.get("ref");
 if(r) document.getElementById("ref").value=r;
})();

// ================= SIGNUP =================
window.signup = async function(){

 let email=document.getElementById("email").value.trim();
 let pass=document.getElementById("password").value.trim();

 if(!email||!pass) return alert("Fill fields");

 try{
   let res=await createUserWithEmailAndPassword(auth,email,pass);
   let uid=res.user.uid;

   await setDoc(doc(db,"users",uid),{
    email,
    wallet:0,
    lastReward:0,
    lastAd:0,
    tasks:0,
    premium:false,
    isAdmin:false
   });

   alert("Signup Success ✅");

 }catch(e){
   alert(e.message);
 }
}

// ================= LOGIN =================
window.login = function(){
 signInWithEmailAndPassword(
  auth,
  document.getElementById("email").value,
  document.getElementById("password").value
 )
 .then(()=>alert("Login Success ✅"))
 .catch(e=>alert(e.message));
}

// ================= DAILY =================
window.dailyReward = async function(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let ref=doc(db,"users",u.uid);
 let snap=await getDoc(ref);

 let now=Date.now();

 if(now-(snap.data().lastReward||0)<86400000)
 return alert("Come tomorrow");

 await updateDoc(ref,{
  wallet:increment(5),
  lastReward:now
 });

 alert("+₹5 Added");
}

// ================= TASK =================
window.task = async function(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let ref=doc(db,"users",u.uid);
 let snap=await getDoc(ref);

 if(Date.now()-(snap.data().lastAd||0)<30000)
 return alert("Wait 30 sec");

 if((snap.data().tasks||0)>=5)
 return alert("Daily limit");

 await updateDoc(ref,{
  wallet:increment(2),
  lastAd:Date.now(),
  tasks:increment(1)
 });

 alert("+₹2 Added");
}

// ================= WITHDRAW =================
window.withdraw = async function(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let amt=parseInt(document.getElementById("amount").value);

 if(!amt || amt<200) return alert("Min ₹200");

 let ref=doc(db,"users",u.uid);
 let snap=await getDoc(ref);

 if(amt>(snap.data().wallet||0)) return alert("No balance");

 await updateDoc(ref,{
  wallet:increment(-amt)
 });

 alert("Withdraw Request Sent ✅");
}

// ================= SHARE =================
window.share = function(){
 let u=auth.currentUser;
 if(!u) return alert("Login first");
 let link=location.origin+"?ref="+u.uid.substring(0,6);
 window.open("https://wa.me/?text="+encodeURIComponent(link));
}

// ================= COPY =================
window.copy = function(){
 let u=auth.currentUser;
 if(!u) return alert("Login first");
 navigator.clipboard.writeText(u.uid.substring(0,6));
 alert("Copied ✅");
}

// ================= BUY =================
window.buy = function(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let rzp=new Razorpay({
  key:"rzp_test_123456",
  amount:9900,
  handler:async ()=>{
   await updateDoc(doc(db,"users",u.uid),{premium:true});
   alert("Premium Activated ✅");
  }
 });

 rzp.open();
}

// ================= ADMIN =================
window.admin = async function(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let snap=await getDoc(doc(db,"users",u.uid));

 if(!snap.data().isAdmin) return alert("Not admin ❌");

 alert("Admin Access Granted ✅");
}

// ================= LEADERBOARD =================
async function loadBoard(){
 let q=query(collection(db,"users"),orderBy("wallet","desc"),limit(5));
 let snap=await getDocs(q);

 let h="";
 snap.forEach(d=>h+=`<p>₹${d.data().wallet}</p>`);
 document.getElementById("leaderboard").innerHTML=h;
}

// ================= AUTH =================
onAuthStateChanged(auth, async u=>{
 if(u){
  document.getElementById("status").innerText="Logged In ✅";
  let snap=await getDoc(doc(db,"users",u.uid));
  document.getElementById("wallet").innerText=snap.data().wallet||0;
 }else{
  document.getElementById("status").innerText="Not Logged ❌";
 }
});

loadBoard();

</script>

</body>
</html>
