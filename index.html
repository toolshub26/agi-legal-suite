<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affidavit SaaS PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center}
.container{max-width:400px;margin:auto;padding:20px}
input{width:90%;padding:10px;margin:10px}
button{padding:12px 20px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.signup{background:#28a745}
.login{background:#007bff}
.buy{background:#ff9800}
.withdraw{background:#e91e63}
.admin{background:#9c27b0}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Affidavit SaaS PRO</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="signup" onclick="signup()">Signup</button>
<button class="login" onclick="login()">Login</button>

<hr>

<input id="ref" placeholder="Referral Code (optional)">
<button class="buy" onclick="buy()">Buy Premium ₹99</button>

<hr>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>
<input id="amount" placeholder="Withdraw Amount">
<button class="withdraw" onclick="withdraw()">Withdraw</button>

<hr>

<button class="admin" onclick="adminPanel()">Admin Panel</button>

<h3 id="status">Checking...</h3>

</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");

// ================= SIGNUP =================
async function signup(){

  let email = emailEl.value.trim();
  let password = passwordEl.value.trim();
  let refCode = document.getElementById("ref").value.trim();

  if(!email || !password){
    alert("Fill all fields ❗");
    return;
  }

  try{
    let res = await auth.createUserWithEmailAndPassword(email, password);

    let uid = res.user.uid;
    let referral = uid.substring(0,6);

    await db.collection("users").doc(uid).set({
      email: email,
      premium:false,
      wallet:0,
      referral: referral,
      usedReferral:false,
      isAdmin:false
    });

    // 🔥 APPLY REFERRAL
    if(refCode){
      await applyReferral(uid, refCode);
    }

    alert("Signup Success ✅");

  }catch(err){
    alert(err.message);
  }
}

// ================= LOGIN =================
function login(){
  auth.signInWithEmailAndPassword(emailEl.value, passwordEl.value)
  .then(()=> alert("Login Success ✅"))
  .catch(err=>alert(err.message));
}

// ================= REFERRAL SYSTEM =================
async function applyReferral(userId, refCode){

  const usersRef = db.collection("users");

  const query = await usersRef.where("referral","==",refCode).get();

  if(query.empty) return;

  const referrerDoc = query.docs[0];
  const referrerId = referrerDoc.id;

  const newUserDoc = await usersRef.doc(userId).get();

  if(newUserDoc.data().usedReferral) return;

  // 💰 Referrer ₹20
  await usersRef.doc(referrerId).update({
    wallet: firebase.firestore.FieldValue.increment(20)
  });

  // 💰 New user ₹10
  await usersRef.doc(userId).update({
    wallet: firebase.firestore.FieldValue.increment(10),
    usedReferral:true
  });

  alert("Referral Applied 🎉");
}

// ================= BUY PREMIUM =================
function buy(){

  let options = {
    key: "rzp_test_123456", // replace with real key
    amount: 9900,
    currency: "INR",
    name: "Affidavit PRO",
    handler: async function () {

      let user = auth.currentUser;

      await db.collection("users").doc(user.uid).update({
        premium:true
      });

      alert("Premium Activated 🚀");
    }
  };

  let rzp = new Razorpay(options);
  rzp.open();
}

// ================= WITHDRAW =================
async function withdraw(){

  let user = auth.currentUser;
  let amount = parseInt(document.getElementById("amount").value);

  if(!user){
    alert("Login first ❗");
    return;
  }

  if(!amount || amount < 50){
    alert("Minimum ₹50 ❗");
    return;
  }

  let doc = await db.collection("users").doc(user.uid).get();
  let balance = doc.data().wallet || 0;

  if(amount > balance){
    alert("Insufficient balance ❌");
    return;
  }

  await db.collection("withdraws").add({
    userId:user.uid,
    amount:amount,
    status:"pending",
    time:Date.now()
  });

  alert("Withdraw request sent ✅");
}

// ================= ADMIN PANEL =================
async function adminPanel(){

  let user = auth.currentUser;

  if(!user){
    alert("Login first ❗");
    return;
  }

  let doc = await db.collection("users").doc(user.uid).get();

  if(!doc.data().isAdmin){
    alert("Not Admin ❌");
    return;
  }

  let requests = await db.collection("withdraws")
    .where("status","==","pending")
    .get();

  requests.forEach(async req=>{

    let data = req.data();

    await db.collection("users").doc(data.userId).update({
      wallet: firebase.firestore.FieldValue.increment(-data.amount)
    });

    await db.collection("withdraws").doc(req.id).update({
      status:"approved"
    });

  });

  alert("All Withdraws Approved ✅");
}

// ================= AUTH STATE =================
auth.onAuthStateChanged(async user=>{

  if(user){
    document.getElementById("status").innerText = "Logged In ✅";

    let doc = await db.collection("users").doc(user.uid).get();
    let data = doc.data();

    document.getElementById("wallet").innerText = data.wallet || 0;

  }else{
    document.getElementById("status").innerText = "Not Logged ❌";
  }
});

</script>

</body>
</html>
