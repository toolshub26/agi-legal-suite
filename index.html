<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earning SaaS PRO FINAL</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:Arial;text-align:center}
.container{max-width:420px;margin:auto;padding:20px}
input{width:90%;padding:10px;margin:8px;border-radius:6px;border:none}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Earning SaaS FINAL</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<input id="ref" placeholder="Referral Code">
<button onclick="share()">📲 Invite</button>
<button onclick="copy()">Copy Code</button>

<hr>

<h3>💰 Wallet: ₹<span id="wallet">0</span></h3>

<button onclick="dailyReward()">🎁 Daily ₹5</button>
<button onclick="task()">📺 Task ₹2</button>

<input id="amount" placeholder="Withdraw Amount">
<button onclick="withdraw()">Withdraw</button>

<hr>

<button onclick="buy()">Buy Premium ₹99</button>
<button onclick="admin()">Admin</button>

<hr>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

<h3 id="status">Checking...</h3>

</div>

<script>

// ✅ FIREBASE CONFIG (CORRECT)
const firebaseConfig = {
  apiKey: "AIzaSyC_1bkBNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.appspot.com", // ⚠️ FIXED
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ✅ SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}

// ================= AUTO REF =================
(function(){
 let p=new URLSearchParams(location.search);
 let r=p.get("ref");
 if(r) document.getElementById("ref").value=r;
})();

// ================= SIGNUP (FIXED) =================
async function signup(){

 let email=emailEl.value.trim();
 let pass=passwordEl.value.trim();
 let refCode=document.getElementById("ref").value.trim();

 if(!email||!pass) return alert("Fill fields");

 try{
   let res=await auth.createUserWithEmailAndPassword(email,pass);
   let uid=res.user.uid;

   let referral=uid.substring(0,6);

   await db.collection("users").doc(uid).set({
    email,
    wallet:0,
    referral,
    usedReferral:false,
    premium:false,
    lastReward:0,
    lastAd:0,
    tasks:0,
    isAdmin:false
   });

   if(refCode) await applyReferral(uid,refCode);

   alert("Signup Success ✅");

 }catch(e){
   alert(e.message);
 }
}

// ================= LOGIN (FIXED ERROR HANDLE) =================
function login(){
 auth.signInWithEmailAndPassword(emailEl.value,passwordEl.value)
 .then(()=>alert("Login Success ✅"))
 .catch(e=>alert(e.message));
}

// ================= REFERRAL =================
async function applyReferral(uid,code){

 let snap=await db.collection("users")
 .where("referral","==",code).get();

 if(snap.empty) return;

 let ref=snap.docs[0];
 let user=await db.collection("users").doc(uid).get();

 if(user.data().usedReferral) return;
 if(ref.id===uid) return;

 await db.collection("users").doc(ref.id).update({
  wallet:firebase.firestore.FieldValue.increment(20)
 });

 await db.collection("users").doc(uid).update({
  wallet:firebase.firestore.FieldValue.increment(10),
  usedReferral:true
 });
}

// ================= SHARE =================
function share(){
 let u=auth.currentUser;
 if(!u) return alert("Login first");
 let link=location.origin+"?ref="+u.uid.substring(0,6);
 window.open("https://wa.me/?text="+encodeURIComponent(link));
}

// ================= COPY =================
function copy(){
 let u=auth.currentUser;
 if(!u) return alert("Login first");
 navigator.clipboard.writeText(u.uid.substring(0,6));
 alert("Copied ✅");
}

// ================= DAILY =================
async function dailyReward(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let ref=db.collection("users").doc(u.uid);
 let d=await ref.get();

 let now=Date.now();

 if(now-(d.data().lastReward||0)<86400000)
 return alert("Come tomorrow");

 await ref.update({
  wallet:firebase.firestore.FieldValue.increment(5),
  lastReward:now
 });

 alert("₹5 Added ✅");
}

// ================= TASK =================
async function task(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let ref=db.collection("users").doc(u.uid);
 let d=await ref.get();

 if(Date.now()-(d.data().lastAd||0)<30000)
 return alert("Wait 30 sec");

 if((d.data().tasks||0)>=5)
 return alert("Daily limit");

 await ref.update({
  wallet:firebase.firestore.FieldValue.increment(2),
  lastAd:Date.now(),
  tasks:firebase.firestore.FieldValue.increment(1)
 });

 alert("₹2 Added ✅");
}

// ================= BUY =================
function buy(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let rzp=new Razorpay({
  key:"rzp_test_123456",
  amount:9900,
  handler:async ()=>{
   await db.collection("users").doc(u.uid).update({premium:true});
   alert("Premium Activated ✅");
  }
 });

 rzp.open();
}

// ================= WITHDRAW =================
async function withdraw(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let amt=parseInt(document.getElementById("amount").value);

 if(!amt || amt<200) return alert("Min ₹200");

 let ref=db.collection("users").doc(u.uid);
 let d=await ref.get();

 if(amt>(d.data().wallet||0)) return alert("No balance");

 await ref.update({
  wallet:firebase.firestore.FieldValue.increment(-amt)
 });

 alert("₹"+amt+" Withdraw Requested ✅");
}

// ================= ADMIN =================
async function admin(){

 let u=auth.currentUser;
 if(!u) return alert("Login first");

 let d=await db.collection("users").doc(u.uid).get();

 if(!d.data().isAdmin) return alert("Not admin ❌");

 alert("Admin Access Granted ✅");
}

// ================= LEADERBOARD =================
async function loadBoard(){
 let s=await db.collection("users")
 .orderBy("wallet","desc").limit(5).get();

 let h="";
 s.forEach(d=>h+=`<p>₹${d.data().wallet}</p>`);
 document.getElementById("leaderboard").innerHTML=h;
}

// ================= AUTH =================
const emailEl=document.getElementById("email");
const passwordEl=document.getElementById("password");

auth.onAuthStateChanged(async u=>{
 if(u){
  status.innerText="Logged In ✅";
  let d=await db.collection("users").doc(u.uid).get();
  wallet.innerText=d.data().wallet||0;
 }else{
  status.innerText="Not Logged ❌";
 }
});

loadBoard();

</script>

</body>
</html>
