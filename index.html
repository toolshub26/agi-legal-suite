<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AGI Legal Suite PRO</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#edf2f7;
font-family:'Inter',sans-serif;
color:#111827;
}

/* TOPBAR */

.topbar{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
color:white;
padding:25px;
box-shadow:0 5px 25px rgba(0,0,0,.2);
}

.top-inner{
max-width:1500px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
}

.logo h1{
font-size:34px;
font-weight:800;
}

.logo p{
opacity:.8;
margin-top:6px;
}

.badge{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
padding:12px 18px;
border-radius:14px;
font-weight:700;
}

/* MAIN */

.main{
max-width:1500px;
margin:30px auto;
display:grid;
grid-template-columns:380px 1fr;
gap:30px;
padding:0 20px;
}

/* SIDEBAR */

.sidebar{
background:white;
border-radius:24px;
padding:28px;
box-shadow:0 10px 35px rgba(0,0,0,.08);
height:fit-content;
position:sticky;
top:20px;
}

.title{
font-size:22px;
font-weight:800;
margin-bottom:20px;
}

.label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-size:14px;
font-weight:700;
}

.input,
.select,
.textarea{
width:100%;
border:1px solid #d1d5db;
background:#f9fafb;
border-radius:14px;
padding:14px;
font-size:15px;
transition:.25s;
}

.input:focus,
.select:focus,
.textarea:focus{
outline:none;
border-color:#2563eb;
background:white;
box-shadow:0 0 0 4px rgba(37,99,235,.1);
}

.textarea{
min-height:90px;
resize:vertical;
}

/* BUTTONS */

.btn-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:25px;
}

.btn{
border:none;
padding:14px;
border-radius:14px;
cursor:pointer;
font-weight:700;
transition:.25s;
font-size:15px;
}

.btn:hover{
transform:translateY(-2px);
}

.primary{
background:#111827;
color:white;
}

.green{
background:#059669;
color:white;
}

.blue{
background:#2563eb;
color:white;
}

.orange{
background:#ea580c;
color:white;
}

/* PAPER */

.paper{
width:210mm;
background:white;
margin:auto;
padding:40px;
box-shadow:0 15px 45px rgba(0,0,0,.15);
}

.paper-inner{
border:2px solid #d1d5db;
padding:45px;
position:relative;
min-height:auto;
}

/* STAMP */

.stamp{
position:absolute;
top:20px;
right:20px;
width:90px;
height:90px;
border:3px solid #dc2626;
border-radius:50%;
color:#dc2626;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
transform:rotate(-15deg);
font-size:20px;
}

/* DOC */

.doc-title{
text-align:center;
font-size:42px;
letter-spacing:3px;
font-family:'Cormorant Garamond',serif;
margin-top:25px;
}

.doc-sub{
text-align:center;
margin-top:10px;
margin-bottom:40px;
font-size:14px;
letter-spacing:2px;
}

.doc-content{
line-height:2;
font-size:18px;
}

.doc-content p{
margin-bottom:20px;
text-align:justify;
}

.doc-content ol{
padding-left:24px;
}

.doc-content li{
margin-bottom:16px;
}

/* SIGN */

.signatures{
margin-top:80px;
display:flex;
justify-content:space-between;
gap:40px;
}

.sign{
width:220px;
text-align:center;
}

.sign-line{
border-top:2px solid black;
padding-top:10px;
}

/* HISTORY */

.history{
margin-top:35px;
}

.history-item{
background:#f3f4f6;
border-left:5px solid #111827;
border-radius:12px;
padding:12px;
margin-bottom:10px;
font-size:14px;
}

/* MOBILE */

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
}

.paper{
width:100%;
padding:15px;
}

.paper-inner{
padding:25px;
}

.doc-title{
font-size:30px;
}

.doc-content{
font-size:16px;
}

.signatures{
margin-top:60px;
gap:20px;
}

.sign{
width:45%;
}

}

/* FINAL PRINT FIX */

@media print{

body{
background:white !important;
margin:0 !important;
padding:0 !important;
zoom:95%;
}

.topbar,
.sidebar{
display:none !important;
}

.main{
display:block !important;
margin:0 !important;
padding:0 !important;
}

.paper{
width:100% !important;
padding:0 !important;
margin:0 !important;
box-shadow:none !important;
background:white !important;
page-break-after:avoid !important;
break-after:avoid-page !important;
}

.paper-inner{
border:2px solid #d1d5db !important;
padding:30px !important;
min-height:auto !important;
page-break-inside:avoid !important;
break-inside:avoid-page !important;
}

.doc-title{
font-size:34px !important;
margin-top:10px !important;
}

.doc-sub{
margin-bottom:25px !important;
}

.doc-content{
font-size:15px !important;
line-height:1.7 !important;
}

.doc-content p,
.doc-content li{
margin-bottom:12px !important;
}

.signatures{
margin-top:45px !important;
page-break-inside:avoid !important;
break-inside:avoid-page !important;
}

.stamp{
width:80px !important;
height:80px !important;
font-size:16px !important;
top:15px !important;
right:15px !important;
}

button{
display:none !important;
}

}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="top-inner">

<div class="logo">
<h1>⚖️ AGI LEGAL SUITE</h1>
<p>Global AI Legal Document Generator</p>
</div>

<div class="badge" id="premiumStatus">
🔴 Free Version
</div>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="title">
Generate Legal Affidavit
</div>

<label class="label">Language</label>

<select class="select" id="lang">

<option>English</option>
<option>Urdu</option>
<option>Hindi</option>
<option>Arabic</option>
<option>French</option>

</select>

<label class="label">Affidavit Purpose</label>

<select class="select" id="purposeType">

<option>Name Change</option>
<option>Address Proof</option>
<option>Birth Affidavit</option>
<option>Income Proof</option>
<option>Marriage Affidavit</option>
<option>Single Status</option>
<option>Nationality</option>
<option>Gap Certificate</option>
<option>Property Declaration</option>
<option>Bank Verification</option>
<option>Lost Document</option>
<option>Vehicle Ownership</option>
<option>Custom Purpose</option>

</select>

<label class="label">Full Name</label>
<input class="input" id="name" placeholder="Enter full name">

<label class="label">Father / Parent Name</label>
<input class="input" id="father" placeholder="Enter parent name">

<label class="label">Age</label>
<input class="input" id="age" type="number" placeholder="Enter age">

<label class="label">Address</label>
<textarea class="textarea" id="address" placeholder="Enter address"></textarea>

<label class="label">Additional Details</label>
<textarea class="textarea" id="details" placeholder="Optional additional details"></textarea>

<label class="label">Place</label>
<input class="input" id="place" placeholder="Enter place">

<label class="label">Date</label>
<input type="date" class="input" id="date">

<div class="btn-grid">

<button class="btn primary" onclick="generateAffidavit()">
Generate
</button>

<button class="btn green" onclick="downloadPDF()">
Print PDF
</button>

<button class="btn blue" onclick="activatePremiumManually()">
Enter Code
</button>

<button class="btn orange" onclick="unlockPremium()">
Buy Premium
</button>

</div>

<div class="history">

<div class="title">
Recent Documents
</div>

<div id="history">
No documents yet.
</div>

</div>

</div>

<!-- PAPER -->

<div class="paper">

<div class="paper-inner" id="previewArea">

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>
Your professional affidavit preview will appear here.
</p>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
