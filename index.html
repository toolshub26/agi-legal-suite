/* PREVIEW */

padding:50px;

}

.watermark{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) rotate(-30deg);

font-weight:800;
color:rgba(0,0,0,.04);
pointer-events:none;
}

.stamp{
position:absolute;
top:25px;
right:25px;
width:100px;
height:100px;
border:3px solid red;
border-radius:50%;

align-items:center;
justify-content:center;
font-size:24px;
font-weight:800;
color:red;
transform:rotate(-15deg);
}

.doc-title{
text-align:center;
font-size:42px;
line-height:1.2;
word-break:break-word;
font-family:'Cormorant Garamond',serif;
margin-top:20px;
}

.doc-sub{

margin-top:10px;
margin-bottom:30px;
letter-spacing:2px;
}

.doc-content{
font-size:18px;

}

.signature-box{

}

.doc-footer{

text-align:center;
font-size:13px;

}

#qrCodeContainer{
margin-top:25px;
display:flex;
justify-content:center;
}

/* LIGHT MODE */

.light-mode{
background:#f3f4f6;
color:#111827;
}

.light-mode .sidebar,
.light-mode .topbar,
.light-mode .stat{
background:white;
color:#111827;
}

.light-mode .input,
.light-mode .select,
.light-mode .textarea{
background:#e5e7eb;
color:#111827;
}

/* PRINT */

@media print{

body{
background:white !important;
}

body *{
visibility:hidden;
}

#previewArea,
#previewArea *{
visibility:visible;
}

#previewArea{
position:absolute;
left:0;
top:0;
width:100%;
padding:25px;
background:white;
color:black;
}

.topbar,
.sidebar,
.analytics{
display:none !important;
}

.preview{
box-shadow:none;
min-height:auto;
padding:0;
margin:0;
}

}

/* MOBILE */

@media(max-width:1100px){

.main{
grid-template-columns:1fr;
}

top:0;

width:100%;
}

}

<script>

let signaturePad;
let totalDocs = 0;

window.onload = ()=>{

const canvas =
document.getElementById("signaturePad");

const ratio =
Math.max(window.devicePixelRatio || 1,1);

canvas.width =
canvas.offsetWidth * ratio;

canvas.height =
200 * ratio;

canvas.getContext("2d")
.scale(ratio,ratio);

signaturePad =
new SignaturePad(canvas,{
backgroundColor:"white",
penColor:"black"
});

};

function clearSignature(){
signaturePad.clear();
}

function generateDocID(){

return "IND-AFF-" +
Math.random()
.toString(36)
.substring(2,8)
.toUpperCase();

}

function generateAffidavit(){

const lang =
document.getElementById("lang").value;

const country =
document.getElementById("country").value;

const purpose =
document.getElementById("purposeType").value;

const name =
document.getElementById("name").value;

const father =
document.getElementById("father").value;

const age =
document.getElementById("age").value;

const address =
document.getElementById("address").value;

const details =
document.getElementById("details").value;

if(!name || !father || !age){

alert("Fill required fields ❌");
return;

}

let affidavitText = "";

if(lang==="Urdu"){

affidavitText =
`میں ${name} ولد ${father} عمر ${age} سال حلفیہ بیان دیتا ہوں۔`;

}else if(lang==="Hindi"){

affidavitText =
`मैं ${name}, पिता ${father}, उम्र ${age} वर्ष शपथपूर्वक घोषणा करता हूँ।`;

}else if(lang==="Arabic"){

affidavitText =
`أنا ${name} ابن ${father} أقر بأن عمري ${age} سنة.`;

}else{

affidavitText =
`I, ${name}, S/o ${father}, aged about ${age} years, resident of ${address}, do hereby solemnly affirm and declare as under.`;

}

const signature =
signaturePad.isEmpty()
? ""
: signaturePad.toDataURL();

const docID =
generateDocID();

document.getElementById("previewArea").innerHTML = `

<div class="stamp">
₹10
</div>

<div class="doc-title">
AFFIDAVIT
</div>

<div class="doc-sub">
BEFORE THE NOTARY PUBLIC
</div>

<div class="doc-content">

<p>${affidavitText}</p>

<p>
<b>Country:</b>
${country}
</p>

<p>
<b>Purpose:</b>
${purpose}
</p>

<p>
<b>Address:</b>
${address}
</p>

<p>
${details}
</p>

${signature
? `
<div class="signature-box">
<img src="${signature}" style="height:90px;">
</div>
`
: ""}

<div id="qrCodeContainer"></div>

<div class="doc-footer">

${docID}

<br><br>

Powered by AGI ULTRA FREE

</div>

</div>
`;

generateQRCode(docID);

totalDocs++;

document.getElementById("totalDocs")
.innerText = totalDocs;

}

function generateQRCode(docID){

const qr =
document.getElementById(
"qrCodeContainer"
);

qr.innerHTML = "";

new QRCode(qr,{
text:
location.origin +
"/verify.html?id=" +
docID,
width:140,
height:140
});

}

function downloadPDF(){

html2pdf()
.set({
margin:5,
filename:"Affidavit.pdf",
image:{
type:"jpeg",
quality:1
},
html2canvas:{
scale:2
},
jsPDF:{
unit:"mm",
format:"a4"
}
})
.from(
document.getElementById("previewArea")
)
.save();

}

function exportPNG(){

html2canvas(
document.getElementById("previewArea")
).then(canvas=>{

const link =
document.createElement("a");

link.download =
"affidavit.png";

link.href =
canvas.toDataURL();

link.click();

});

}

function shareWhatsApp(){

const text =
document.getElementById("previewArea")
.innerText;

window.open(
`https://wa.me/?text=${encodeURIComponent(text)}`,
"_blank"
);

}

function toggleTheme(){

document.body.classList.toggle(
"light-mode"
);

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./sw.js"
);

}

</script>
