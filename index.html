<script>

(function(){

/* =========================
   SAFE v28 PURPOSE SYSTEM
========================= */

let isPremiumMode = true;

let premiumPurposes = [];
let freePurposes = [];

/* =========================
   FALLBACK PURPOSES
========================= */

const fallbackPurposes = {

  "Legal":[
    "Name Change",
    "Affidavit of Truth",
    "Legal Heir",
    "Succession Certificate",
    "Indemnity Bond",
    "Legal Notice",
    "Witness Statement",
    "Power of Attorney"
  ],

  "Banking":[
    "Bank Account Opening",
    "Bank Loan",
    "Cheque Bounce",
    "Loan Closure",
    "Bank Guarantee",
    "Income Proof"
  ],

  "Court":[
    "Court Submission",
    "Bail Affidavit",
    "FIR Affidavit",
    "Anticipatory Bail",
    "Court Marriage"
  ],

  "Marriage":[
    "Marriage",
    "Love Marriage",
    "Second Marriage",
    "Single Status",
    "Divorce Affidavit"
  ],

  "Property":[
    "Property Transfer",
    "Property Mutation",
    "Rental Agreement",
    "Property Dispute",
    "Tenant Verification"
  ],

  "Visa":[
    "Visa Application",
    "Student Visa",
    "Work Permit",
    "Family Visa",
    "Immigration"
  ],

  "Police":[
    "Police Verification",
    "Police Clearance",
    "Cyber Crime Complaint",
    "Online Fraud Complaint"
  ],

  "Education":[
    "University Degree",
    "Migration Certificate",
    "Bonafide Certificate",
    "Duplicate Marksheet"
  ],

  "Government":[
    "Aadhaar Correction",
    "Domicile Certificate",
    "Nationality Certificate",
    "Income Certificate"
  ],

  "Medical":[
    "Medical Consent",
    "Hospital Declaration",
    "Medical Insurance Claim"
  ],

  "Business":[
    "GST Registration",
    "MSME Registration",
    "Trade License",
    "Partnership Deed"
  ],

  "Vehicle":[
    "Vehicle Sale",
    "Vehicle Purchase",
    "Car Transfer",
    "Bike Transfer"
  ]

};

/* =========================
   LOAD PURPOSES
========================= */

async function loadPurposesFromJSON(){

  try{

    const response =
      await fetch("./purposes.json");

    if(!response.ok){
      throw new Error("purposes.json missing");
    }

    const data = await response.json();

    premiumPurposes =
      Object.values(data).flat();

    if(!premiumPurposes.length){
      throw new Error("Empty purposes");
    }

    freePurposes =
      premiumPurposes.slice(0,20);

    populatePurposes();

    console.log("Purposes loaded");

  }catch(error){

    console.warn(
      "Fallback purposes active",
      error
    );

    premiumPurposes =
      Object.values(fallbackPurposes).flat();

    freePurposes =
      premiumPurposes.slice(0,20);

    populatePurposes();

  }

}

/* =========================
   GET PURPOSES
========================= */

function getCurrentPurposeList(){

  return isPremiumMode
    ? premiumPurposes
    : freePurposes;

}

/* =========================
   POPULATE PURPOSES
========================= */

function populatePurposes(filter = ""){

  const select =
    document.getElementById(
      "purposeDropdown"
    );

  if(!select) return;

  const current = select.value;

  select.innerHTML = "";

  const filtered =
    getCurrentPurposeList().filter(item =>
      item.toLowerCase()
      .includes(filter.toLowerCase())
    );

  filtered.forEach(item => {

    const option =
      document.createElement("option");

    option.value = item;
    option.textContent = item;

    select.appendChild(option);

  });

  if(filtered.includes(current)){

    select.value = current;

  }else if(filtered.length){

    select.selectedIndex = 0;

  }

}

/* =========================
   SAFE TOAST
========================= */

function showToast(message){

  const toast =
    document.createElement("div");

  toast.className = "toast";

  toast.innerText = message;

  document.body.appendChild(toast);

  setTimeout(()=>{

    toast.remove();

  },2500);

}

/* =========================
   DOM READY
========================= */

document.addEventListener(
  "DOMContentLoaded",
  ()=>{

    /* SEARCH */

    const purposeSearch =
      document.getElementById(
        "purposeSearch"
      );

    if(purposeSearch){

      purposeSearch.addEventListener(
        "input",
        (e)=>{

          populatePurposes(
            e.target.value
          );

        }
      );

    }

    /* FREE BUTTON */

    const freeBtn =
      document.getElementById(
        "freeModeBtn"
      );

    if(freeBtn){

      freeBtn.onclick = ()=>{

        isPremiumMode = false;

        populatePurposes();

        showToast(
          "FREE mode enabled"
        );

      };

    }

    /* PREMIUM BUTTON */

    const premiumBtn =
      document.getElementById(
        "premiumModeBtn"
      );

    if(premiumBtn){

      premiumBtn.onclick = ()=>{

        isPremiumMode = true;

        populatePurposes();

        showToast(
          "PREMIUM mode enabled"
        );

      };

    }

    /* LOAD PURPOSES */

    loadPurposesFromJSON();

  }
);

/* =========================
   DROPDOWN UI FIX
========================= */

const style =
document.createElement("style");

style.innerHTML = `

.purpose-scroll select{
  width:100%;
  background:transparent;
  color:#ffffff;
  border:none;
  outline:none;
  font-size:14px;
}

.purpose-scroll option{
  padding:10px;
  background:#132238;
  color:#ffffff;
}

`;

document.head.appendChild(style);

})();

</script>
