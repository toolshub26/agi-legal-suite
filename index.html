<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <meta name="theme-color" content="#0a192f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AGI Legal">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://cdn.jsdelivr.net; worker-src blob:;">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>AGI ULTRA PRO v18 – Enterprise Affidavit System</title>
</head>
<body class="dark">
  <div id="offlineBanner" class="offline-banner">⚠️ You are offline – some features limited</div>
  <div id="appLockScreen" class="app-lock-screen">
    <div class="lock-container">
      <h2>🔐 App Lock</h2>
      <input type="password" id="lockPin" placeholder="Enter PIN" maxlength="6" pattern="\d*" inputmode="numeric">
      <button id="unlockBtn" class="premium-btn">Unlock</button>
      <button id="setPinBtn" class="glass-btn">Set PIN (first time)</button>
    </div>
  </div>
  <div id="appContent" style="display: none;">
    <div class="topbar">
      <div class="logo-area">⚖️ AGI ULTRA PRO v18</div>
      <div class="btn-group">
        <button id="freeVersionBtn" class="glass-btn">📄 Free</button>
        <button id="premiumVersionBtn" class="premium-btn">👑 PREMIUM</button>
        <button id="installAppBtn" class="glass-btn install-btn">📲 Install</button>
        <button id="pdfExportBtn" class="glass-btn">📑 PDF</button>
        <button id="pngExportBtn" class="glass-btn">🖼️ PNG</button>
        <button id="copyTextBtn" class="glass-btn">📋 Copy</button>
        <button id="themeToggleBtn" class="glass-btn">🌓 Theme</button>
        <button id="printNowBtn" class="glass-btn">🖨️ Print</button>
        <button id="voiceInputBtn" class="glass-btn">🎤 Voice</button>
        <button id="ocrUploadBtn" class="glass-btn">📄 OCR</button>
        <button id="backupBtn" class="glass-btn">💾 Backup</button>
        <button id="restoreBtn" class="glass-btn">🔄 Restore</button>
        <button id="logoutBtn" class="glass-btn">🚪 Logout</button>
      </div>
    </div>
    <div class="cards-row">
      <div class="analytics-card"><h3 id="totalDocsCount">0</h3><p>Total Docs</p></div>
      <div class="analytics-card"><h3 id="totalExportsCount">0</h3><p>Exports</p></div>
      <div class="analytics-card"><h3 id="topPurpose">-</h3><p>Top Purpose</p></div>
    </div>
    <div class="main-dashboard">
      <div class="form-panel">
        <h2>📝 Affidavit Details <span id="saveBadge" class="save-badge">Saved</span></h2>
        <div class="field"><label>Full Name *</label><input type="text" id="fullName" value="Abdul Rahman Khan" aria-label="Full name"></div>
        <div class="field"><label>Father's Name *</label><input type="text" id="fatherName" value="Mohammed Salim" aria-label="Father's name"></div>
        <div class="field"><label>Address *</label><input type="text" id="address" value="House 42, Street 8, Dubai, UAE" aria-label="Address"></div>
        <div class="field"><label>Country</label><select id="countrySelect" aria-label="Country"><option>India</option><option>UAE</option><option>USA</option><option>UK</option><option>Canada</option></select></div>
        <div class="field"><label>Language</label><select id="langSelect" aria-label="Language"><option value="en">English</option><option value="ur">Urdu</option><option value="hi">Hindi</option><option value="ar">Arabic (RTL)</option><option value="bn">Bengali</option><option value="fr">French</option><option value="tr">Turkish</option><option value="fa">Persian</option></select></div>
        <div class="field"><label>📌 Purpose (filter)</label><input type="text" id="purposeSearch" placeholder="Search purpose..." aria-label="Search purpose"></div>
        <div class="purpose-scroll"><select id="purposeDropdown" size="8" aria-label="Purpose list"></select></div>
        <div class="field"><label>Sworn Statement</label><textarea id="swornStatement" rows="2" aria-label="Statement">I hereby declare that the facts mentioned are true and accurate.</textarea></div>
        <div class="settings-bar">
          <select id="templateSelect" aria-label="Template"><option value="standard">Standard</option><option value="court">Court Format</option><option value="modern">Modern Legal</option><option value="compact">Compact</option></select>
          <select id="sealColorSelect" aria-label="Seal color"><option value="red">Red Seal</option><option value="blue">Blue Seal</option><option value="gold">Gold Seal</option></select>
          <select id="qualitySelect" aria-label="Export quality"><option value="standard">Standard</option><option value="high">High</option><option value="ultra">Ultra</option></select>
          <label><input type="checkbox" id="watermarkToggle" checked> Watermark</label>
          <label><input type="checkbox" id="aiEnhanceToggle"> AI Enhance</label>
        </div>
        <div class="signature-area">
          <label>✍️ Electronic Signature</label>
          <canvas id="signatureCanvas" width="500" height="150" style="width:100%; height:150px; background:#fff;" aria-label="Signature canvas"></canvas>
          <div style="display: flex; gap: 10px; margin-top: 8px;">
            <button id="clearSignatureBtn" class="glass-btn">Clear</button>
            <button id="saveSignatureBtn" class="premium-btn">Save</button>
          </div>
        </div>
        <button id="generateAffidavitBtn" class="premium-btn" style="width:100%; padding:14px;">✨ GENERATE NEW ID</button>
        <div class="history-list"><strong>📜 History (last 10)</strong><div id="historyContainer"></div></div>
        <div class="sticky-gen"><button id="mobileGenerateBtn" class="premium-btn" style="width:100%;">✨ Generate</button></div>
        <div class="digital-stamp-area" style="margin-top:16px; text-align:center;">
          <button id="generateDigitalStampBtn" class="glass-btn">🖌️ Generate Digital Stamp</button>
          <canvas id="digitalStampCanvas" width="150" height="150" style="display:none;"></canvas>
        </div>
      </div>
      <div class="preview-panel">
        <div id="affidavitContainer" class="affidavit-paper">
          <div id="watermarkElem" class="watermark-text">PREMIUM LEGAL</div>
          <div id="stampElem" class="stamp red">📜 NOTARY SEAL</div>
          <div id="dynamicAffidavitContent"></div>
          <div id="qrArea" class="qr-container"></div>
          <div class="footer-note" id="docFooter">Document ID: AGI-XXXX</div>
        </div>
      </div>
    </div>
  </div>
  <div id="progressModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Exporting...</h3>
      <div class="progress-bar"><div id="exportProgress" style="width:0%;"></div></div>
      <p id="progressText">0%</p>
    </div>
  </div>
  <div id="toastContainer"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
