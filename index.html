<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affidavit SaaS Pro</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0}
button{padding:10px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer}
</style>

</head>
<body>

<div class="container">

<h2>🚀 Affidavit SaaS System</h2>

<!-- LOGIN -->
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<hr>

<!-- TOOL -->
<select id="template">
<option value="general">General (Free)</option>
<option value="name">Name Change (Premium)</option>
<option value="address">Address Change (Premium)</option>
<option value="income">Income Affidavit (Premium)</option>
</select>

<br>

<button onclick="payUPI()">💰 Pay ₹49</button>
<button onclick="unlockWithCode()">🔑 Enter Code</button>

<hr>

<div id="status">Checking...</div>

</div>

<script>

// 🔥 FIREBASE CONFIG (YAHAN APNI DETAILS DAALO)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ================= LOGIN =================
function register(){
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(()=>alert("Registered ✅"))
  .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(()=>alert("Login Success 🚀"))
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
  alert("Logged Out");
}

// ================= PREMIUM CHECK =================
let isPremium = false;

auth.onAuthStateChanged(user => {

  if(user){

    db.collection("users").doc(user.uid).get()
    .then(doc => {

      if(doc.exists && doc.data().premium){
        isPremium = true;
        document.getElementById("status").innerHTML = "✅ Premium User";
      } else {
        isPremium = false;
        document.getElementById("status").innerHTML = "Free User";
      }

    });

  } else {
    document.getElementById("status").innerHTML = "Not Logged In";
  }

});

// ================= LOCK SYSTEM =================
document.getElementById("template").addEventListener("change", function(){

  if(this.value !== "general" && !isPremium){
    alert("🚀 Premium Feature. Please upgrade.");
    this.value = "general";
  }

});

// ================= UPI PAYMENT =================
function payUPI(){

  let upi = "upi://pay?pa=rehmankhatibur4-1@okaxis&pn=Khateeb&am=49&cu=INR&tn=AffidavitPremium";

  window.location.href = upi;

}

// ================= CODE UNLOCK =================
function unlockWithCode(){

  let code = prompt("Enter Premium Code:");

  if(code === "DSS123"){

    let user = auth.currentUser;

    if(!user){
      alert("Login first ❗");
      return;
    }

    db.collection("users").doc(user.uid).set({
      premium:true
    });

    alert("🎉 Premium Unlocked!");
    location.reload();

  } else {
    alert("Invalid Code ❌");
  }

}

</script>

</body>
</html>
