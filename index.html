<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a192f">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Noto+Naskh+Arabic&family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    img-src 'self' data: blob: https:;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://www.gstatic.com https://checkout.razorpay.com;
    connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://us-central1-affidavittool.cloudfunctions.net;
    frame-src https://checkout.razorpay.com;
  ">
  <title>AGI Legal Pro – Global Affidavit System</title>
  <link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/affidavit.css">
<link rel="stylesheet" href="css/premium.css">
<link rel="stylesheet" href="css/responsive.css">
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
</head>
<body>

<main>

<section id="plans">
<h2>Plans</h2>

<button>Free</button>
<button>Premium</button>
<button>Pro</button>

</section>

<section id="countrySection">
<h2>Select Country</h2>

<select id="countrySelect">
<option>Select Country</option>
</select>

</section>

<section id="languageSection">
<h2>Select Language</h2>

<select id="languageSelect">
<option>Select Language</option>
</select>

</section>

<section id="themeSection">
<h2>Select Theme</h2>

<select id="themeSelect">
<option>Classic Legal</option>
<option>Royal Blue</option>
<option>Emerald Green</option>
<option>Premium Gold</option>
<option>Executive Black</option>
</select>

</section>

<section id="affidavitForm">

<h2>Affidavit Information</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="father" placeholder="Father / Husband Name">

<input type="number" id="age" placeholder="Age">

<textarea id="address" placeholder="Address"></textarea>

<select id="purposeSelect">
<option>Select Affidavit Purpose</option>
</select>

<textarea id="statement" placeholder="Statement"></textarea>

<button id="generateBtn">
Generate Affidavit
</button>

<button onclick="generatePDF()">
Download PDF
</button>

</section>

<section id="previewArea">
<h2>Preview</h2>
</section>

</main>

 <script>
    (function() {
      const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC_1bKbNGAoGviGt1-a1f27h9VDj4hr3oA",
  authDomain: "affidavittool.firebaseapp.com",
  projectId: "affidavittool",
  storageBucket: "affidavittool.firebasestorage.app",
  messagingSenderId: "108525725649",
  appId: "1:108525725649:web:2c3cab440860c81e6de2f0"
};

if (!firebase.apps.length) {
  firebase.initializeApp(FIREBASE_CONFIG);
}
      const auth = firebase.auth();
      const db = firebase.firestore();
      const functions = firebase.functions();

      // Cloud Function callable references
      const createOrderFn = functions.httpsCallable('createOrder');
      const verifyPaymentFn = functions.httpsCallable('verifyPayment');
      const checkPremiumFn = functions.httpsCallable('checkPremium');
      const createFinalAffidavitFn = functions.httpsCallable('createFinalAffidavit');

      // Global state
      let currentTheme = localStorage.getItem('agi_theme') || 'classic';
      let signaturePad = null;
      let signatureDataURL = '';
      let uploadedPhoto = '';
      let currentAffidavitId = null;
      let recentPurposes = [];
      let isPremium = false; // will be overridden by server check

      // UI helpers
      function showToast(msg, err = false) { /* same as before */ }
      function escapeHtml(str) { /* same */ }
      // ... (date, language helpers same)

      // Premium status from server
      async function refreshPremiumStatus() {
        if (!auth.currentUser) {
          isPremium = false;
          updateUI(false);
          return;
        }
        try {
          const result = await checkPremiumFn();
          isPremium = result.data.premium;
          updateUI(isPremium);
        } catch (e) {
          isPremium = false;
          updateUI(false);
        }
        updatePurposesByMode();
      }

      function updateUI(premium) {
        document.getElementById('modeBadge').innerText = premium ? 'PREMIUM' : 'FREE';
        document.getElementById('modeBadge').style.background = premium ? '#d4af37' : '#6c757d';
        document.getElementById('themePremiumContainer').style.display = premium ? 'block' : 'none';
        document.getElementById('brandingContainer').style.display = premium ? 'block' : 'none';
      }

      // Purposes list (same as before)

      // Generate preview (still client-side)
      async function generatePreview() {
        // same as previous generateAffidavit logic, but without finalization
      }

      // Finalize affidavit (server call)
      async function finalizeAffidavit() {
        if (!auth.currentUser) { showToast("Login required", true); return; }

        // Collect current draft data
        const name = document.getElementById('name').value.trim();
        const father = document.getElementById('father').value.trim();
        const age = document.getElementById('age').value.trim();
        const address = document.getElementById('address').value.trim();
        const purpose = document.getElementById('selectedPurpose').value;
        const statement = document.getElementById('statement').value;
        const country = document.getElementById('countrySelect').value;
        const state = document.getElementById('stateSelect').value;
        const language = document.getElementById('languageSelect').value;
        const attestationType = document.getElementById('attestationType').value;

        // Save draft to IndexedDB first? Optional.
        // Call Cloud Function
        try {
          // we assume a draft was saved previously and we have draftId.
          // For simplicity, we create a draft in Firestore before finalizing.
          const draftRef = await db.collection('draft_affidavits').add({
            userId: auth.currentUser.uid,
            name, father, age, address, purpose, statement,
            country, state, language, attestationType,
            finalized: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          const result = await createFinalAffidavitFn({ draftId: draftRef.id });
          const { affidavitId, verificationToken, hash, status } = result.data;

          // Show in preview the token and QR
          const previewDiv = document.getElementById('previewArea');
          previewDiv.innerHTML += `
<div style="margin-top:20px; text-align:center; border-top:1px solid #ccc; padding-top:15px;">
  <p><strong>Verification Token:</strong><br><span style="font-size:12px;">${verificationToken}</span></p>
  <div id="qrCodeContainer"></div>
</div>`;
          new QRCode(document.getElementById('qrCodeContainer'), {
            text: `https://toolshub26.github.io/agi-legal-suite/verify.html?id=${affidavitId}&token=${verificationToken}`,
            width: 120, height: 120
          });
          showToast('Affidavit finalized!');
        } catch (err) {
          showToast(err.message, true);
        }
      }

      // Generate button now finalizes
      document.getElementById('generateBtn').onclick = async () => {
        await generatePreview();
        await finalizeAffidavit();
      };

      // Payment buttons
      document.getElementById('upgradeBtn').onclick = async () => {
        if (!auth.currentUser) { showToast("Login first", true); return; }
        try {
          const orderResult = await createOrderFn();
          const options = {
            key: "YOUR_RAZORPAY_KEY_ID",
            amount: orderResult.data.amount,
            currency: orderResult.data.currency,
            order_id: orderResult.data.orderId,
            name: "AGI LEGAL PRO",
            description: "Monthly Premium",
            handler: async function(response) {
              try {
                const verifyResult = await verifyPaymentFn({
                  razorpay_payment_id: response.razorpay_payment_id,
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_signature: response.razorpay_signature
                });
                if (verifyResult.data.success) {
                  showToast("Premium activated!");
                  refreshPremiumStatus();
                }
              } catch (e) { showToast(e.message, true); }
            },
            prefill: { email: auth.currentUser.email },
            theme: { color: "#d4af37" }
          };
          const rzp = new Razorpay(options);
          rzp.open();
        } catch (e) { showToast(e.message, true); }
      };

      // Auth state
      auth.onAuthStateChanged(async (user) => {
        if (user) {
          document.getElementById('loginBtn').style.display = 'none';
          document.getElementById('logoutBtn').style.display = 'inline-block';
          document.getElementById('userEmail').innerText = user.email;
          await refreshPremiumStatus();
        } else {
          document.getElementById('loginBtn').style.display = 'inline-block';
          document.getElementById('logoutBtn').style.display = 'none';
          document.getElementById('userEmail').innerText = '';
          isPremium = false;
          updateUI(false);
          updatePurposesByMode();
        }
        generatePreview();
      });

      // ... (rest of the event listeners, draft loading, etc.)
    })();
  </script>
</body>
</html>
