<!-- =========================================
AGI ULTRA PRO v18 VERIFY 🚀
FINAL FIXED ENTERPRISE VERIFY SYSTEM
========================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AGI ULTRA PRO v18 VERIFY 🚀
</title>

<meta
name="theme-color"
content="#020617">

<meta
name="description"
content="Enterprise AI Legal Verification System">

<link
rel="manifest"
href="./manifest.json">

<link
rel="icon"
href="./launchericon-192x192.png">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
overflow-x:hidden;
}

body{

font-family:"Inter",sans-serif;

background:
linear-gradient(
135deg,
#020617,
#0f172a
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

color:white;

overflow-x:hidden;

}

/* =========================================
VERIFY BOX
========================================= */

.verify-box{

width:100%;
max-width:760px;

background:
rgba(255,255,255,.05);

backdrop-filter:blur(14px);

padding:40px;

border-radius:30px;

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 55px rgba(0,0,0,.35);

text-align:center;

animation:fadeIn .5s ease;

position:relative;

overflow:hidden;

}

/* =========================================
WATERMARK
========================================= */

.watermark{

position:absolute;

top:50%;
left:50%;

transform:
translate(-50%,-50%)
rotate(-30deg);

font-size:80px;

font-weight:800;

color:rgba(255,255,255,.03);

white-space:nowrap;

pointer-events:none;

}

/* =========================================
LOGO
========================================= */

.logo{

font-size:36px;
font-weight:800;

margin-bottom:10px;

position:relative;
z-index:2;

}

.logo span{
color:#3b82f6;
}

/* =========================================
TITLE
========================================= */

h2{

font-size:30px;

margin-bottom:25px;

position:relative;
z-index:2;

}

/* =========================================
RESULT
========================================= */

#result{

margin-top:20px;

padding:25px;

border-radius:22px;

background:#111827;

font-size:16px;

line-height:1.9;

word-break:break-word;

position:relative;
z-index:2;

}

/* =========================================
STATUS
========================================= */

.success{

color:#10b981;

font-size:34px;

font-weight:800;

margin-bottom:15px;

}

.failed{

color:#ef4444;

font-size:34px;

font-weight:800;

margin-bottom:15px;

}

/* =========================================
DOC CARD
========================================= */

.doc-card{

margin-top:20px;

background:#1f2937;

padding:22px;

border-radius:18px;

text-align:left;

border-left:
5px solid #2563eb;

}

.doc-card p{

margin-bottom:12px;

font-size:15px;

}

/* =========================================
BADGE
========================================= */

.badge{

display:inline-block;

padding:10px 18px;

border-radius:999px;

font-size:13px;

font-weight:700;

margin-top:20px;

}

.valid{
background:#059669;
}

.invalid{
background:#dc2626;
}

/* =========================================
SEARCH BOX
========================================= */

.search-box{

margin-top:25px;

display:flex;

gap:12px;

flex-wrap:wrap;

justify-content:center;

position:relative;
z-index:2;

}

.search-box input{

flex:1;

min-width:220px;

padding:14px;

border:none;

border-radius:14px;

background:#1f2937;

color:white;

font-size:14px;

outline:none;

}

/* =========================================
BUTTONS
========================================= */

.actions{

margin-top:25px;

display:flex;

gap:14px;

justify-content:center;

flex-wrap:wrap;

position:relative;
z-index:2;

}

button{

padding:14px 18px;

border:none;

border-radius:14px;

font-weight:700;

cursor:pointer;

font-size:14px;

transition:.25s;

color:white;

}

button:hover{

transform:translateY(-2px);

}

.primary{
background:#2563eb;
}

.green{
background:#059669;
}

.red{
background:#dc2626;
}

.orange{
background:#ea580c;
}

.purple{
background:#7c3aed;
}

/* =========================================
STATUS BAR
========================================= */

.status-bar{

margin-top:20px;

padding:14px;

border-radius:16px;

background:#1e293b;

font-size:14px;

font-weight:700;

color:#60a5fa;

position:relative;
z-index:2;

}

/* =========================================
FOOTER
========================================= */

.footer{

margin-top:30px;

font-size:13px;

opacity:.7;

position:relative;
z-index:2;

}

/* =========================================
ANIMATION
========================================= */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =========================================
MOBILE
========================================= */

@media(max-width:700px){

.verify-box{
padding:25px;
}

h2{
font-size:22px;
}

.logo{
font-size:28px;
}

.doc-card{
padding:16px;
}

.actions{
flex-direction:column;
}

.actions button{
width:100%;
}

}

</style>

</head>

<body>

<div class="verify-box">

<div class="watermark">
AGI VERIFY
</div>

<div class="logo">
⚖️ <span>AGI VERIFY</span>
</div>

<h2>
🔍 Enterprise Document Verification
</h2>

<!-- SEARCH -->

<div class="search-box">

<input
type="text"
id="manualID"
placeholder="Enter Document ID">

<button
class="purple"
onclick="manualVerify()">

Verify ID

</button>

</div>

<!-- RESULT -->

<div id="result">

Checking document...

</div>

<!-- STATUS -->

<div class="status-bar"
id="statusBar">

⚡ AGI Verification Engine Active

</div>

<!-- ACTIONS -->

<div class="actions">

<button
class="primary"
onclick="goHome()">

🏠 Home

</button>

<button
class="green"
onclick="printPage()">

🖨 Print

</button>

<button
class="orange"
onclick="downloadResult()">

📥 Save

</button>

<button
class="purple"
onclick="copyDocID()">

📋 Copy ID

</button>

<button
class="red"
onclick="scanAgain()">

🔄 Verify Again

</button>

</div>

<div class="footer">

AGI ULTRA PRO v18 AI 🚀

</div>

</div>

<script>

/* =========================================
SERVICE WORKER
========================================= */

if("serviceWorker" in navigator){

navigator.serviceWorker.register(
"./sw.js"
);

}

/* =========================================
GET URL PARAMS
========================================= */

const urlParams =
new URLSearchParams(
location.search
);

let currentID =

urlParams.get("id") ||

urlParams.get("verify") ||

"";

/* =========================================
RESULT
========================================= */

const result =
document.getElementById(
"result"
);

/* =========================================
STATUS
========================================= */

function setStatus(msg){

document.getElementById(
"statusBar"
).innerHTML = msg;

}

/* =========================================
VERIFY
========================================= */

function verifyDocument(id){

if(!id){

result.innerHTML = `

<div class="failed">
❌ INVALID REQUEST
</div>

<p>
No document ID provided.
</p>

<div class="badge invalid">
INVALID
</div>

`;

setStatus(
"❌ Verification Failed"
);

return;

}

let data =
localStorage.getItem(
"doc_" + id
);

if(data){

let d = {};

try{

d = JSON.parse(data);

}catch(error){

console.log(
"Invalid JSON"
);

}

result.innerHTML = `

<div class="success">
✔ VERIFIED
</div>

<p>
This affidavit is valid and verified successfully.
</p>

<div class="doc-card">

<p>
<b>Document ID:</b>
${id}
</p>

<p>
<b>Name:</b>
${d.name || "N/A"}
</p>

<p>
<b>Date:</b>
${d.date || "N/A"}
</p>

<p>
<b>Purpose:</b>
${d.purpose || "Official Affidavit"}
</p>

<p>
<b>Status:</b>
Verified Successfully
</p>

<p>
<b>Verification Time:</b>
${new Date().toLocaleString()}
</p>

</div>

<div class="badge valid">
AUTHENTIC DOCUMENT
</div>

`;

setStatus(
"✅ Authentic Legal Document"
);

}else{

result.innerHTML = `

<div class="failed">
❌ DOCUMENT NOT FOUND
</div>

<p>
This affidavit could not be verified.
</p>

<div class="doc-card">

<p>
Possible reasons:
</p>

<p>
• Invalid QR Code</p>

<p>
• Deleted document</p>

<p>
• Expired verification</p>

<p>
• Fake affidavit attempt</p>

</div>

<div class="badge invalid">
INVALID DOCUMENT
</div>

`;

setStatus(
"🚨 Invalid Document Detected"
);

}

}

/* =========================================
MANUAL VERIFY
========================================= */

function manualVerify(){

const id =

document.getElementById(
"manualID"
).value.trim();

if(!id){

alert(
"Enter Document ID"
);

return;

}

currentID = id;

verifyDocument(id);

}

/* =========================================
COPY ID
========================================= */

function copyDocID(){

if(!currentID){

alert(
"No Document ID"
);

return;

}

navigator.clipboard.writeText(
currentID
);

alert(
"Copied ✔"
);

}

/* =========================================
DOWNLOAD
========================================= */

function downloadResult(){

const blob =

new Blob(
[
document.body.innerText
],
{
type:"text/plain"
}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =

"verification-" +

(currentID || "document") +

".txt";

a.click();

}

/* =========================================
HOME
========================================= */

function goHome(){

window.location.href =
"./index.html";

}

/* =========================================
PRINT
========================================= */

function printPage(){

window.print();

}

/* =========================================
VERIFY AGAIN
========================================= */

function scanAgain(){

window.location.href =
"./verify.html";

}

/* =========================================
LIVE TITLE
========================================= */

setInterval(()=>{

document.title =

"VERIFY • " +

new Date()
.toLocaleTimeString();

},1000);

/* =========================================
AUTO FOCUS
========================================= */

document.getElementById(
"manualID"
).focus();

/* =========================================
ONLINE STATUS
========================================= */

window.addEventListener(
"offline",
()=>{

setStatus(
"⚠ Offline Mode Active"
);

});

window.addEventListener(
"online",
()=>{

setStatus(
"✅ Connection Restored"
);

});

/* =========================================
AUTO VERIFY
========================================= */

verifyDocument(currentID);

</script>

</body>
</html>
