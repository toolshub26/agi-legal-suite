<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AGI ULTRA PRO v18 SIGNUP 🚀
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:"Inter",sans-serif;

background:
linear-gradient(
135deg,
#020617,
#0f172a"
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

overflow:hidden;

color:white;

}

/* =========================================
SIGNUP BOX
========================================= */

.signup-box{

width:100%;
max-width:480px;

background:
rgba(255,255,255,.05);

backdrop-filter:blur(14px);

padding:40px;

border-radius:28px;

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 15px 50px rgba(0,0,0,.4);

animation:fadeIn .5s ease;

}

/* =========================================
LOGO
========================================= */

.logo{

text-align:center;
margin-bottom:30px;

}

.logo h1{

font-size:34px;
font-weight:800;

}

.logo span{
color:#3b82f6;
}

.logo p{

margin-top:10px;
opacity:.75;

}

/* =========================================
FORM
========================================= */

label{

display:block;

margin-top:16px;
margin-bottom:8px;

font-size:14px;
font-weight:700;

}

input{

width:100%;

padding:15px;

border:none;

border-radius:16px;

background:#1f2937;

color:white;

font-size:14px;

outline:none;

}

/* =========================================
BUTTONS
========================================= */

button{

width:100%;

padding:15px;

border:none;

border-radius:16px;

font-size:15px;

font-weight:700;

cursor:pointer;

transition:.25s;

margin-top:18px;

}

button:hover{

transform:translateY(-2px);

}

.primary{

background:#2563eb;
color:white;

}

.google{

background:white;
color:#111827;

}

.login{

background:#7c3aed;
color:white;

}

/* =========================================
STATUS
========================================= */

.status{

margin-top:18px;

padding:14px;

border-radius:14px;

background:#111827;

text-align:center;

font-size:13px;

}

/* =========================================
FOOTER
========================================= */

.footer{

margin-top:25px;

text-align:center;

font-size:13px;

opacity:.7;

}

/* =========================================
ANIMATION
========================================= */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =========================================
MOBILE
========================================= */

@media(max-width:600px){

.signup-box{

padding:28px;

}

.logo h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="signup-box">

<!-- LOGO -->

<div class="logo">

<h1>
⚖️ <span>AGI ULTRA</span>
</h1>

<p>
Enterprise Legal SaaS Signup
</p>

</div>

<!-- FORM -->

<label>
Full Name
</label>

<input
type="text"
id="fullname"
placeholder="Enter full name">

<label>
Email Address
</label>

<input
type="email"
id="email"
placeholder="Enter email">

<label>
Password
</label>

<input
type="password"
id="password"
placeholder="Create password">

<label>
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm password">

<!-- BUTTONS -->

<button
class="primary"
onclick="signup()">

🚀 Create Account

</button>

<button
class="google"
onclick="googleSignup()">

🌐 Signup With Google

</button>

<button
class="login"
onclick="openLogin()">

🔐 Already Have Account

</button>

<!-- STATUS -->

<div class="status"
id="statusBox">

System Ready ✅

</div>

<!-- FOOTER -->

<div class="footer">

AGI ULTRA PRO v18 AI 🚀

</div>

</div>

<!-- =========================================
FIREBASE
========================================= -->

<script
type="module"
src="firebase.js"></script>

<script>

/* =========================================
STATUS
========================================= */

function setStatus(msg){

document.getElementById(
"statusBox"
).innerText = msg;

}

/* =========================================
SIGNUP
========================================= */

async function signup(){

const fullname =
document.getElementById(
"fullname"
).value.trim();

const email =
document.getElementById(
"email"
).value.trim();

const password =
document.getElementById(
"password"
).value;

const confirmPassword =
document.getElementById(
"confirmPassword"
).value;

if(
!fullname ||
!email ||
!password ||
!confirmPassword
){

setStatus(
"Fill all fields ❌"
);

return;

}

if(password.length < 6){

setStatus(
"Password minimum 6 characters ❌"
);

return;

}

if(
password !== confirmPassword
){

setStatus(
"Passwords do not match ❌"
);

return;

}

setStatus(
"Creating account..."
);

try{

await window.signupUser(
email,
password,
fullname
);

localStorage.setItem(
"agi_user_name",
fullname
);

localStorage.setItem(
"loggedUser",
email
);

setStatus(
"Account Created Successfully ✅"
);

setTimeout(()=>{

location.href =
"dashboard.html";

},1500);

}catch(error){

console.error(error);

setStatus(
"Signup Failed ❌"
);

}

}

/* =========================================
GOOGLE SIGNUP
========================================= */

async function googleSignup(){

setStatus(
"Opening Google Signup..."
);

try{

await window.loginWithGoogle();

setStatus(
"Google Signup Successful ✅"
);

}catch(error){

console.error(error);

setStatus(
"Google Signup Failed ❌"
);

}

}

/* =========================================
OPEN LOGIN
========================================= */

function openLogin(){

location.href =
"login.html";

}

/* =========================================
LIVE TITLE
========================================= */

setInterval(()=>{

document.title =
"AGI SIGNUP • " +
new Date()
.toLocaleTimeString();

},1000);

</script>

</body>
</html>
